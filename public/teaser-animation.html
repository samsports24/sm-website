<!DOCTYPE html>
<html><head>

<script>
const C=document.getElementById('c');
const W=C.width=1080, H=C.height=1920;
C.style.width='100vw'; C.style.height='100vh'; C.style.objectFit='contain';
const ctx=C.getContext('2d');

const BPM=130, BEAT=60/BPM, DUR=30;
let startTime=null;

// Colors
const BG='#020617', GOLD='#d4af37', CYAN='#06b6d4', GREEN='#22c55e',
      AMBER='#f59e0b', ROSE='#f43e5e', LGRAY='#cbd5e1';

// Easing
function easeOut(t){return 1-Math.pow(1-t,3)}
function easeInOut(t){return t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2}
function clamp01(t){return Math.max(0,Math.min(1,t))}

// Particles
class Particle{
  constructor(x,y,color,speed,size){
    this.x=x;this.y=y;this.color=color;this.speed=speed;this.size=size;
    this.vx=(Math.random()-.5)*speed;this.vy=(Math.random()-.5)*speed;
    this.life=1;this.decay=.005+Math.random()*.01;
    this.angle=Math.random()*Math.PI*2;
  }
  update(){
    this.x+=this.vx;this.y+=this.vy;
    this.vy+=.02;this.life-=this.decay;
    this.angle+=.02;
  }
  draw(ctx){
    if(this.life<=0)return;
    ctx.save();
    ctx.globalAlpha=this.life*.6;
    ctx.fillStyle=this.color;
    ctx.shadowColor=this.color;
    ctx.shadowBlur=this.size*3;
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size*this.life,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}
let particles=[];
function spawnBurst(x,y,n,color,speed=3,size=4){
  for(let i=0;i<n;i++)particles.push(new Particle(x,y,color,speed,size+Math.random()*3));
}

// Glow helper
function drawGlow(x,y,r,color,alpha=.15){
  const g=ctx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,color+''+Math.round(alpha*255).toString(16).padStart(2,'0'));
  g.addColorStop(1,color+'00');
  ctx.fillStyle=g;
  ctx.fillRect(x-r,y-r,r*2,r*2);
}

// Text helpers
function text(str,x,y,{size=32,color='#fff',align='center',bold=true,glow=false,glowColor=null,maxW=null}={}){
  ctx.save();
  ctx.font=`${bold?'bold':''} ${size}px 'Segoe UI',system-ui,sans-serif`;
  ctx.textAlign=align;ctx.textBaseline='top';ctx.fillStyle=color;
  if(glow){ctx.shadowColor=glowColor||color;ctx.shadowBlur=20;}
  if(maxW)ctx.fillText(str,x,y,maxW);
  else ctx.fillText(str,x,y);
  ctx.restore();
}

// Gradient rect
function gradRect(x,y,w,h,c1,c2,r=0){
  const g=ctx.createLinearGradient(x,y,x,y+h);
  g.addColorStop(0,c1);g.addColorStop(1,c2);
  if(r>0){roundRect(x,y,w,h,r,g);}
  else{ctx.fillStyle=g;ctx.fillRect(x,y,w,h);}
}

function roundRect(x,y,w,h,r,fill,stroke=null,strokeW=1){
  ctx.beginPath();
  ctx.roundRect(x,y,w,h,r);
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=strokeW;ctx.stroke();}
}

// Beat pulse
function beatPulse(t){
  const phase=(t%BEAT)/BEAT;
  return Math.max(0,1-phase*4);
}

// Light streak
function lightStreak(y,width,color,alpha){
  const g=ctx.createLinearGradient(0,y,W,y);
  g.addColorStop(0,color+'00');
  g.addColorStop(0.3,color+Math.round(alpha*255).toString(16).padStart(2,'0'));
  g.addColorStop(0.5,color+Math.round(alpha*180).toString(16).padStart(2,'0'));
  g.addColorStop(0.7,color+Math.round(alpha*255).toString(16).padStart(2,'0'));
  g.addColorStop(1,color+'00');
  ctx.fillStyle=g;
  ctx.fillRect(0,y-width/2,W,width);
}

// Flash overlay
function flash(alpha){
  ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);ctx.restore();
}

// SCENE RENDERERS

    text('Powered by Live API-Football Data', W/2, 1145+20*(1-a), {size:20,color:`rgba(34,197,94,${a*.8})`,bold:false});
  }

  // Beat border
  if(bp>.1){
    ctx.save();ctx.globalAlpha=bp*.35;ctx.strokeStyle=GOLD;ctx.lineWidth=3+bp*3;
    ctx.beginPath();ctx.roundRect(8,8,W-16,H-16,16);ctx.stroke();ctx.restore();
  }
}

function drawStatCard(x,y,w,label,value,sub,accent,bp){
  gradRect(x,y,w,90,'#141e32','#0d1424');
  roundRect(x,y,w,90,12,null,accent+'40',1);
  if(bp>.1){
    ctx.save();ctx.globalAlpha=bp*.2;
    roundRect(x,y,w,90,12,null,accent,2);
    ctx.restore();
  }
  text(label,x+14,y+10,{size:13,color:'#8892a8',align:'left',bold:false});
  text(value,x+14,y+32,{size:34,color:'#fff',align:'left'});
  if(sub)text(sub,x+14,y+70,{size:12,color:GOLD+'cc',align:'left',bold:false});
}

function drawGroupCard(x,y,w,letter,matches,picks,st){
  const h=48+matches.length*42;
  gradRect(x,y,w,h,'#121a30','#0c1226');
  roundRect(x,y,w,h,12,null,'#283448',1);
  // Header badge
  roundRect(x+8,y+8,28,28,6,CYAN);
  text(letter,x+22,y+10,{size:18,color:'#020617'});
  text(`Group ${letter}`,x+44,y+12,{size:20,color:'#fff',align:'left'});
  const picked=Object.keys(picks).length;
  text(`${picked}/${matches.length}`,x+w-14,y+14,{size:16,color:'#8892a8',align:'right',bold:false});

  matches.forEach(([t1,t2],i)=>{
    const my=y+48+i*42;
    const mid=x+w/2;
    const bw=(w-90)/2;
    const pick=picks[i];
    // T1
    if(pick===1){
      roundRect(x+6,my,bw,34,7,'#124830');
      roundRect(x+6,my,bw,34,7,null,'#4ade80',2);
      text(t1,x+16,my+7,{size:17,color:'#86efac',align:'left'});
      text('✓',x+6+bw-22,my+7,{size:17,color:'#4ade80',align:'left'});
    } else {
      roundRect(x+6,my,bw,34,7,'#1e293b');
      text(t1,x+16,my+7,{size:16,color:'#e2e8f0',align:'left',bold:false});
    }
    // Draw
    const dx=mid-24;
    roundRect(dx,my,48,34,7,'#141c2d');
    text('Draw',mid,my+8,{size:13,color:'#64748b',bold:false});
    // T2
    const t2x=mid+28;
    if(pick===2){
      roundRect(t2x,my,bw,34,7,'#124830');
      roundRect(t2x,my,bw,34,7,null,'#4ade80',2);
      text(t2,t2x+10,my+7,{size:17,color:'#86efac',align:'left'});
      text('✓',t2x+bw-22,my+7,{size:17,color:'#4ade80',align:'left'});
    } else {
      roundRect(t2x,my,bw,34,7,'#1e293b');
      text(t2,t2x+10,my+7,{size:16,color:'#e2e8f0',align:'left',bold:false});
    }
  });
}

    const ry=248+i*44;
    const xo=60*(1-ra);
    ctx.save();ctx.globalAlpha=ra;
    if(i%2===0)roundRect(24,ry-3,W-48,40,4,'#0f172a80');
    if(isFirst){drawGlow(W/2,ry+18,300,GOLD,.03);roundRect(24,ry-3,W-48,40,4,null,GOLD+'50',1);}
    text(rank,36+xo,ry+6,{size:isFirst?20:17,color:isFirst?GOLD:'#e2e8f0',align:'left'});
    text(name,110+xo,ry+2,{size:19,color:'#f1f5f9',align:'left'});
    text('• '+country,110+xo,ry+22,{size:13,color:'#64748b',align:'left',bold:false});
    text(pick,650+xo,ry+8,{size:17,color:'#94a3b8',align:'left',bold:false});
    text(score,910+xo,ry+4,{size:26,color:i<3?GREEN:'#e2e8f0',align:'left'});
    ctx.restore();
  });
}

function scene5_rewards(t, st, bp){
  gradRect(0,0,W,H,'#020617','#060d1c');
  if(st<.02)flash((0.02-st)*12);
  drawGlow(W/2,300,400,GOLD,.05);

  const ta=easeOut(clamp01(st/.05));
  text('💰 EARN SAMPOINTS',W/2,90+40*(1-ta),{size:48,color:`rgba(212,175,55,${ta})`,glow:true,glowColor:GOLD});
  text('Correct predictions = real rewards',W/2,165,{size:22,color:`rgba(200,210,225,${ta*.8})`,bold:false});

  const rewards=[
    ['⚽  Group Match','+20,000 PT',GREEN,'#0f3020'],
    ['📊  Group Position','+50,000 PT',GREEN,'#0f3020'],
    ['🎯  Round of 32','+75,000 PT',GREEN,'#0f3020'],
    ['🔥  Round of 16','+150,000 PT',CYAN,'#0f2030'],
    ['⚡  Quarterfinals','+200,000 PT',CYAN,'#0f2030'],
    ['🌟  Semifinals','+500,000 PT',AMBER,'#302810'],
    ['🥉  3rd Place','+350,000 PT',AMBER,'#302810'],
    ['🏆  FINAL','+1,000,000 PT',GOLD,'#302a0f'],
  ];

  rewards.forEach(([name,pts,color,tint],i)=>{
    const ra=easeOut(clamp01((st-.05-i*.035)/.035));
    if(ra<=0)return;
    const ry=230+i*78;
    const yo=ry+50*(1-ra);
    const isFinal=i===7;

    ctx.save();ctx.globalAlpha=ra;
    if(isFinal)drawGlow(W/2,yo+33,100+40*bp,GOLD,.12);
    gradRect(44,yo,W-88,64,tint,tint+'88');
    roundRect(44,yo,W-88,64,12,null,isFinal?GOLD:(color+'40'),isFinal?2:1);
    text(name,65,yo+17,{size:isFinal?24:21,color:'#f1f5f9',align:'left'});
    text(pts,W-65,yo+16,{size:isFinal?28:23,color:color,align:'right',glow:isFinal,glowColor:GOLD});
    ctx.restore();

    if(ra>.95&&ra<1)drawGlow(W/2,yo+32,200,color,.04);
  });

  if(st>.7){
    const ua=easeOut(clamp01((st-.7)/.08));
    const pulse=.7+.3*Math.sin(t*8);
    text('🔥 2x MULTIPLIER FOR UPSETS!',W/2,870,{size:28,color:`rgba(245,158,11,${ua*pulse})`,glow:true,glowColor:AMBER});
    text('Powered by FIFA World Rankings',W/2,910,{size:17,color:`rgba(100,116,139,${ua*.7})`,bold:false});
  }
}

function scene6_cta(t, st, bp){
  gradRect(0,0,W,H,'#020617','#080e22');
  if(st<.03)flash((0.03-st)*10);

  drawGlow(W/2,H/3,500,GOLD,.08);
  drawGlow(W/2-200,H/2+100,300,CYAN,.04);
  drawGlow(W/2+200,H/2-100,280,GOLD,.04);

  // Burst particles at start
  if(st<.05&&particles.length<300){spawnBurst(W/2,H/2,40,GOLD,6,4);spawnBurst(W/2,H/2,30,CYAN,5,3);}

  text('SAM',W/2,320,{size:100,color:'#fff',glow:true,glowColor:'#fff'});
  text('SPORTS',W/2,440,{size:100,color:GOLD,glow:true,glowColor:GOLD});

  text('🏆',W/2,600,{size:80,color:'#fff'});
  text('WORLD CUP 2026',W/2,700,{size:60,color:GOLD,glow:true,glowColor:GOLD});
  text('PREDICTOR',W/2,775,{size:60,color:CYAN,glow:true,glowColor:CYAN});

  // CTA button
  const pulse=.85+.15*Math.sin(t*8);
  drawGlow(W/2,910,130+40*bp,GREEN,.12);
  const g=ctx.createLinearGradient(180,880,W-180,945);
  g.addColorStop(0,`rgba(34,197,94,${pulse})`);g.addColorStop(1,`rgba(16,185,129,${pulse})`);
  roundRect(180,882,W-360,62,31,g,'#86efac',2);
  text('PLAY NOW — IT\'S FREE',W/2,896,{size:28,color:'#fff'});

  text('samsports.io',W/2,1000,{size:24,color:GOLD,glow:true,glowColor:GOLD});
  text('Predict  •  Compete  •  Win SamPoints',W/2,1040,{size:20,color:'#94a3b8',bold:false});

  if(bp>.05){
    ctx.save();ctx.globalAlpha=bp*.3;ctx.strokeStyle=GOLD;ctx.lineWidth=2+bp*3;
    ctx.beginPath();ctx.roundRect(8,8,W-16,H-16,16);ctx.stroke();ctx.restore();
  }
}

// ═══ MAIN LOOP ═══
function render(timestamp){
  if(!startTime)startTime=timestamp;
  const t=(timestamp-startTime)/1000;
  if(t>=DUR){ctx.fillStyle=BG;ctx.fillRect(0,0,W,H);return;}

  const bp=beatPulse(t);
  ctx.clearRect(0,0,W,H);

  // Scene routing
  if(t<4.5)scene1_intro(t,t/4.5,bp);
  else if(t<11)scene2_groups(t,(t-4.5)/6.5,bp);
  else if(t<17)scene3_knockout(t,(t-11)/6,bp);
  else if(t<22)scene4_leaderboard(t,(t-17)/5,bp);
  else if(t<27)scene5_rewards(t,(t-22)/5,bp);
  else scene6_cta(t,(t-27)/3,bp);

  // Update and draw particles (all scenes)
  particles.forEach(p=>{p.update();p.draw(ctx);});
  particles=particles.filter(p=>p.life>0);

  requestAnimationFrame(render);
}
requestAnimationFrame(render);
</script>
