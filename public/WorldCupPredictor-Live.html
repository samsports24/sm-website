                    onChange={e => handleKoScore("home", e.target.value)}
                    className="w-7 h-6 text-center text-[11px] font-mono bg-slate-800 border border-slate-600 rounded text-white focus:border-amber-400 focus:outline-none [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none"
                    placeholder="-" />
                </div>
              ) : null}
            </div>
            <div className="h-px bg-slate-800" />
            <div className="flex items-center">
              <div className="flex-1">
                <KoRow team={match.teamB}
                  winner={(match.actual ? match.actual==="B" : match.winner && match.teamB && match.winner.id === match.teamB.id)}
                  score={match.score.away}
                  locked={locked}
                  onClick={()=>!locked && match.teamB && onPick(match.teamB)}
                  big={big} />
              </div>
              {!locked && onScoreChange && match.teamA && match.teamB ? (
                <div className="flex flex-col items-center gap-0.5 px-1 flex-none">
                  <input type="number" min="0" max="99" value={sa}
                    onChange={e => handleKoScore("away", e.target.value)}
                    className="w-7 h-6 text-center text-[11px] font-mono bg-slate-800 border border-slate-600 rounded text-white focus:border-amber-400 focus:outline-none [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none"
                    placeholder="-" />
                </div>
              ) : null}
            </div>
            {match.date && (
              <div className="px-2 py-1 text-[10px] text-slate-500 flex items-center justify-between border-t border-slate-800">
                <span>{new Date(match.date).toLocaleDateString(undefined,{month:"short",day:"numeric"})}</span>
                {locked && <span className="text-cyan-400 uppercase">FT</span>}
              </div>
            )}
          </div>
        );
      }

      function KoRow({ team, winner, score, locked, onClick, big=false }) {
        if (!team) {
          return <div className={`${big ? "px-3 py-3" : "px-2 py-1.5"} text-xs text-slate-600 italic flex items-center gap-2`}>
            <span className="opacity-60">⚽</span> awaiting result
          </div>;
        }
        return (
          <button onClick={onClick} disabled={locked}
            className={`w-full text-left ${big ? "px-3 py-3" : "px-2 py-1.5"} flex items-center gap-2 text-xs transition ${winner ? "bg-emerald-500/20 text-emerald-200 font-semibold shadow-[inset_0_0_0_1px_rgba(52,211,153,0.4)]" : "hover:bg-slate-800/80 text-slate-200"} ${locked ? "cursor-default" : ""}`}>
            <TeamBadge team={team} size={big?22:14} />
            <span className={`${big ? "text-sm" : ""} truncate flex-1`}>{big ? team.name : team.code}</span>
            {score != null && <span className="text-[11px] font-mono text-cyan-200">{score}</span>}
            {winner && !locked && <Check className="h-3.5 w-3.5 text-emerald-300 shrink-0" />}
          </button>
        );
      }

      /* ---------- Leaderboard ---------- */
      function Leaderboard({ rows, account, authToken, onSignIn }) {
        const [mode, setMode] = useState("overall"); // "overall" | "country" | "group"
        const [countryFilter, setCountryFilter] = useState(
          () => account?.country || "BR"
        );
        useEffect(() => {
          if (account?.country) setCountryFilter(account.country);
        }, [account?.country]);

        // Private groups state
        const [myGroups, setMyGroups] = useState([]);
        const [activeGroupId, setActiveGroupId] = useState(null);
        const [groupLB, setGroupLB] = useState([]);
        const [groupLoading, setGroupLoading] = useState(false);
        const [showCreate, setShowCreate] = useState(false);
        const [showJoin, setShowJoin] = useState(false);
        const [newGroupName, setNewGroupName] = useState("");
        const [joinCode, setJoinCode] = useState("");
        const [groupErr, setGroupErr] = useState(null);
        const [copiedCode, setCopiedCode] = useState(null);

        // Load user's groups on mount (if authenticated)
        useEffect(() => {
          if (!authToken) return;
          apiLoadMyGroups(authToken).then(setMyGroups).catch(() => {});
        }, [authToken]);

        // Load group leaderboard when a group is selected
        useEffect(() => {
          if (!activeGroupId || !authToken) return;
          setGroupLoading(true);
          apiGroupLeaderboard(authToken, activeGroupId)
            .then(lb => setGroupLB(lb))
            .catch(() => setGroupLB([]))
            .finally(() => setGroupLoading(false));
        }, [activeGroupId, authToken]);

        const handleCreateGroup = async () => {
          if (!newGroupName.trim()) return;
          setGroupErr(null);
          try {
            const res = await apiCreateGroup(authToken, newGroupName.trim());
            const grp = res.data?.group || res.group;
            if (grp) setMyGroups(prev => [...prev, grp]);
            setNewGroupName(""); setShowCreate(false);
          } catch (e) { setGroupErr(e.message); }
        };
        const handleJoinGroup = async () => {
          if (!joinCode.trim()) return;
          setGroupErr(null);
          try {
            const res = await apiJoinGroup(authToken, joinCode.trim());
            const grp = res.data?.group || res.group;
            if (grp) setMyGroups(prev => [...prev, grp]);
            setJoinCode(""); setShowJoin(false);
          } catch (e) { setGroupErr(e.message); }
        };
        const handleLeaveGroup = async (gid) => {
          try {
            await apiLeaveGroup(authToken, gid);
            setMyGroups(prev => prev.filter(g => g._id !== gid));
            if (activeGroupId === gid) { setActiveGroupId(null); setGroupLB([]); setMode("overall"); }
          } catch {}
        };
        const copyInvite = (code) => {
          navigator.clipboard?.writeText(code);
          setCopiedCode(code);
          setTimeout(() => setCopiedCode(null), 2000);
        };

        const countriesInUse = useMemo(() => {
          const counts = new Map();
          rows.forEach(r => {
            if (!r.country) return;
            counts.set(r.country, (counts.get(r.country) || 0) + 1);
          });
          return [...counts.entries()]
            .sort((a,b) => b[1] - a[1] || a[0].localeCompare(b[0]))
            .map(([code, n]) => ({ code, n }));
        }, [rows]);

        const filtered = useMemo(() => {
          if (mode === "group") return groupLB.map((r,i) => ({ ...r, rank: i+1 }));
          if (mode === "country") return rows.filter(r => r.country === countryFilter).map((r,i) => ({ ...r, countryRank: i+1 }));
          return rows;
        }, [mode, rows, countryFilter, groupLB]);

        const myRow = rows.find(r => r.isUser);
        const myCountryRank = account
          ? rows.filter(r => r.country === account.country)
                .findIndex(r => r.isUser) + 1
          : 0;

        // Render a leaderboard table
        const renderTable = (data, isGroup) => (
          <div className="rounded-2xl border border-slate-800 bg-slate-900/70 overflow-hidden">
            <div className="grid grid-cols-[3rem_2rem_1fr_7rem_5rem] text-[11px] uppercase text-slate-500 px-4 py-2 border-b border-slate-800">
              <div>Rank</div><div></div><div>Player</div><div className="text-center">Winner pick</div><div className="text-right">Score</div>
            </div>
            {data.length === 0 ? (
              <div className="px-4 py-6 text-sm text-slate-500 text-center">
                {isGroup ? "No picks in this group yet." : `No players yet from ${countryName(countryFilter)}. Be the first!`}
              </div>
            ) : data.map(row => {
              const displayRank = mode === "country" ? row.countryRank : row.rank;
              return (
                <div key={`${displayRank}-${row.name || row.displayName}`} className={`grid grid-cols-[3rem_2rem_1fr_7rem_5rem] items-center px-4 py-2 text-sm border-b border-slate-800/70 last:border-none ${row.isUser ? "bg-emerald-400/10 text-emerald-100" : "text-slate-300"}`}>
                  <div className={`font-bold ${displayRank===1?"text-amber-300":displayRank===2?"text-slate-200":displayRank===3?"text-orange-300":"text-slate-500"}`}>
                    {displayRank===1 ? <span className="inline-flex items-center gap-1"><Crown className="h-3.5 w-3.5" />1</span> : `#${displayRank}`}
                  </div>
                  <div className="text-center text-base leading-none" title={countryName(row.country)}>
                    {flagFor(row.country)}
                  </div>
                  <div className="truncate flex items-center gap-2">
                    {row.isUser ? <span className="inline-flex items-center gap-1.5"><Star className="h-3.5 w-3.5 text-emerald-300" /><span className="font-semibold">{row.name || row.displayName}</span></span> : (row.name || row.displayName)}
                    {!isGroup && mode === "overall" && row.country && <span className="text-[10px] text-slate-500 uppercase">· {countryName(row.country)}</span>}
                  </div>
                  <div className="text-center text-xs text-slate-400 truncate">{row.winner || "—"}</div>
                  <div className="text-right font-mono font-semibold">{fmtPts(row.score || row.totalPoints)}</div>
                </div>
              );
            })}
          </div>
        );

        return (
          <section className="mt-10">
            <div className="flex items-center gap-2 mb-3 flex-wrap">
              <TrendingUp className="h-5 w-5 text-cyan-300" />
              <h2 className="text-lg font-bold">Leaderboard</h2>
              <div className="ml-auto inline-flex rounded-lg bg-slate-900/80 border border-slate-800 p-1">
                <button onClick={()=>{setMode("overall");setActiveGroupId(null);}}
                  className={`px-3 py-1 text-xs rounded-md font-semibold transition ${mode==="overall" ? "bg-slate-800 text-emerald-300" : "text-slate-400 hover:text-slate-200"}`}>
                  <span className="inline-flex items-center gap-1.5"><Trophy className="h-3.5 w-3.5" /> Overall</span>
                </button>
                <button onClick={()=>setMode("country")}
                  className={`px-3 py-1 text-xs rounded-md font-semibold transition ${mode==="country" ? "bg-slate-800 text-emerald-300" : "text-slate-400 hover:text-slate-200"}`}>
                  <span className="inline-flex items-center gap-1.5">🌍 Country</span>
                </button>
                {authToken && (
                  <button onClick={()=>setMode("group")}
                    className={`px-3 py-1 text-xs rounded-md font-semibold transition ${mode==="group" ? "bg-slate-800 text-emerald-300" : "text-slate-400 hover:text-slate-200"}`}>
                    <span className="inline-flex items-center gap-1.5"><Users className="h-3.5 w-3.5" /> Groups</span>
                  </button>
                )}
              </div>
            </div>

            {mode === "country" && (
              <div className="mb-3 flex items-center gap-2 flex-wrap">
                <label className="text-xs text-slate-400">Showing</label>
                <select value={countryFilter} onChange={e=>setCountryFilter(e.target.value)}
                  className="bg-slate-900 border border-slate-800 rounded-md px-2 py-1 text-sm text-slate-100">
                  {countriesInUse.map(c => (
                    <option key={c.code} value={c.code}>{flagFor(c.code)} {countryName(c.code)} ({c.n})</option>
                  ))}
                </select>
                {account && account.country === countryFilter && myCountryRank > 0 && (
                  <span className="text-xs text-emerald-300">You're #{myCountryRank} in {countryName(countryFilter)}</span>
                )}
              </div>
            )}

            {/* Private Groups toolbar */}
            {mode === "group" && authToken && (
              <div className="mb-3 space-y-2">
                <div className="flex items-center gap-2 flex-wrap">
                  <button onClick={()=>{setShowCreate(true);setShowJoin(false);setGroupErr(null);}}
                    className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-gradient-to-br from-emerald-500/20 to-cyan-500/20 border border-emerald-500/40 text-emerald-300 text-xs font-semibold hover:brightness-125">
                    <Shield className="h-3.5 w-3.5" /> Create Group
                  </button>
                  <button onClick={()=>{setShowJoin(true);setShowCreate(false);setGroupErr(null);}}
                    className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-slate-800 border border-slate-700 text-slate-300 text-xs font-semibold hover:text-white">
                    <KeyRound className="h-3.5 w-3.5" /> Join Group
                  </button>
                </div>

                {/* Create form */}
                {showCreate && (
                  <div className="flex items-center gap-2 flex-wrap">
                    <input value={newGroupName} onChange={e=>setNewGroupName(e.target.value)}
                      placeholder="Group name" maxLength={30}
                      className="bg-slate-900 border border-slate-700 rounded-md px-2 py-1 text-sm text-white w-44 focus:border-emerald-400 focus:outline-none"
                      onKeyDown={e => e.key === "Enter" && handleCreateGroup()} />
                    <button onClick={handleCreateGroup}
                      className="px-3 py-1 rounded-md bg-emerald-500 text-slate-900 text-xs font-bold hover:bg-emerald-400">Create</button>
                    <button onClick={()=>setShowCreate(false)} className="text-slate-500 text-xs hover:text-slate-300">Cancel</button>
                  </div>
                )}

                {/* Join form */}
                {showJoin && (
                  <div className="flex items-center gap-2 flex-wrap">
                    <input value={joinCode} onChange={e=>setJoinCode(e.target.value)}
                      placeholder="Invite code" maxLength={6}
                      className="bg-slate-900 border border-slate-700 rounded-md px-2 py-1 text-sm text-white w-28 font-mono uppercase focus:border-cyan-400 focus:outline-none"
                      onKeyDown={e => e.key === "Enter" && handleJoinGroup()} />
                    <button onClick={handleJoinGroup}
                      className="px-3 py-1 rounded-md bg-cyan-500 text-slate-900 text-xs font-bold hover:bg-cyan-400">Join</button>
                    <button onClick={()=>setShowJoin(false)} className="text-slate-500 text-xs hover:text-slate-300">Cancel</button>
                  </div>
                )}

                {groupErr && <div className="text-xs text-red-400">{groupErr}</div>}

                {/* Group chips */}
                {myGroups.length > 0 && (
                  <div className="flex items-center gap-2 flex-wrap">
                    {myGroups.map(g => (
                      <div key={g._id}
                        className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs border cursor-pointer transition ${activeGroupId === g._id ? "bg-emerald-500/20 border-emerald-400 text-emerald-200" : "bg-slate-800/80 border-slate-700 text-slate-400 hover:text-slate-200 hover:border-slate-600"}`}>
                        <span onClick={() => setActiveGroupId(g._id)} className="font-semibold">{g.name}</span>
                        <span className="text-[10px] text-slate-500">({g.members?.length || 0})</span>
                        <button onClick={(e)=>{e.stopPropagation();copyInvite(g.inviteCode);}} title={`Invite code: ${g.inviteCode}`}
                          className="ml-0.5 text-slate-500 hover:text-cyan-300">
                          {copiedCode === g.inviteCode ? <Check className="h-3 w-3 text-emerald-400" /> : <Copy className="h-3 w-3" />}
                        </button>
                        <button onClick={(e)=>{e.stopPropagation();handleLeaveGroup(g._id);}} title="Leave group"
                          className="text-slate-600 hover:text-red-400">
                          <X className="h-3 w-3" />
                        </button>
                      </div>
                    ))}
                  </div>
                )}

                {myGroups.length === 0 && !showCreate && !showJoin && (
                  <div className="text-xs text-slate-500 italic">Create a group to compete with friends, or join one with an invite code.</div>
                )}
              </div>
            )}

            {/* Guest banner */}
            {!account && (
              <div className="mb-3 rounded-lg bg-gradient-to-br from-emerald-500/10 to-cyan-500/10 border border-emerald-500/30 px-4 py-3 flex items-center gap-3 flex-wrap">
                <Star className="h-5 w-5 text-emerald-300 flex-none" />
                <div className="text-sm text-slate-200 flex-1 min-w-[16rem]">
                  <b>Playing as guest.</b> Your picks are saved on this device but you won't appear in the rankings.
                </div>
                <button onClick={onSignIn} className="inline-flex items-center gap-2 rounded-lg px-3.5 py-2 bg-gradient-to-br from-emerald-400 to-cyan-500 text-slate-900 font-semibold text-sm hover:brightness-110">
                  Join the leaderboard
                </button>
              </div>
            )}

            {mode === "group" && groupLoading && (
              <div className="flex items-center justify-center py-8 text-slate-500 text-sm gap-2">
                <Loader2 className="h-4 w-4 animate-spin" /> Loading group leaderboard…
              </div>
            )}
            {mode === "group" && !activeGroupId && !groupLoading && myGroups.length > 0 && (
              <div className="text-center py-6 text-sm text-slate-500">Select a group above to see rankings.</div>
            )}
            {(mode !== "group" || (activeGroupId && !groupLoading)) && renderTable(filtered, mode === "group")}
          </section>
        );
      }

      /* ---------- SamPoints wallet ----------
         Users earn SamPoints from correct predictions. SamPoints are
         1:1 spendable in samsports fantasy. The "Send to Fantasy" button
         POSTs the unsynced amount to your fantasy backend.
      ------------------------------------------------------------ */
      function SamPointsWallet({ account, stats, onSync, syncToast }) {
        // Banked = earned from matches that have already settled.
        // Synced = portion already pushed to the fantasy wallet.
        // Claimable = banked - synced (what the button will send).
        const banked = stats.settledPoints || 0;
        const synced = account.samPointsSynced || 0;
        const claimable = Math.max(0, banked - synced);
        const projected = stats.totalPoints || 0;

        const openFantasy = () => {
          // REAL IMPL: window.location.href = "/fantasy?ref=wcp";
          // For now, just sync first then show a toast.
          if (claimable > 0) onSync(claimable);
        };

        return (
          <div className="inline-flex items-center gap-2 rounded-lg bg-slate-900 border border-amber-500/40 px-3 py-2 text-sm relative overflow-hidden">
            <div className="absolute inset-0 bg-gradient-to-r from-amber-500/5 via-amber-500/10 to-orange-500/5 pointer-events-none" />
            <div className="relative flex items-center gap-2">
              <div className="h-6 w-6 rounded-full bg-gradient-to-br from-amber-300 to-orange-400 flex items-center justify-center text-slate-900 font-black text-[11px]">S</div>
              <div className="leading-tight">
                <div className="text-[10px] uppercase tracking-wider text-amber-200/80">SamPoints</div>
                <div className="font-bold text-white">
                  {synced.toLocaleString()}
                  {claimable > 0 && (
                    <span className="ml-1 text-amber-300 text-xs font-semibold">+{fmtPts(claimable)}</span>
                  )}
                </div>
              </div>
            </div>
            {claimable > 0 && (
              <button
                onClick={openFantasy}
                title={`Send ${fmtPts(claimable)} SamPoints to your fantasy wallet (1 point = 1 fantasy credit)`}
                className="relative inline-flex items-center gap-1.5 rounded-md px-2.5 py-1 bg-gradient-to-br from-amber-400 to-orange-500 text-slate-900 font-semibold text-xs hover:brightness-110"
              >
                {syncToast ? <><Check className="h-3.5 w-3.5" /> Sent!</> : <>Send to Fantasy</>}
              </button>
            )}
            {claimable === 0 && projected > 0 && (
              <span className="relative text-[11px] text-slate-500 italic" title={`You could bank up to ${fmtPts(projected)} SamPoints once those matches finish`}>
                {fmtPts(projected)} projected
              </span>
            )}
          </div>
        );
      }

      /* ---------- Auth modal (MOCK — replace with samsports SSO) ---------- */
      function AuthModal({ mode, onClose, onAuth }) {
        const [tab, setTab] = useState(mode === "signup" ? "signup" : "signin");
        const [displayName, setDisplayName] = useState("");
        const [email, setEmail] = useState("");
        const [country, setCountry] = useState("");
        const [error, setError] = useState(null);

        useEffect(() => {
          const onKey = e => e.key === "Escape" && onClose();
          window.addEventListener("keydown", onKey);
          return () => window.removeEventListener("keydown", onKey);
        }, [onClose]);

        const submit = (e) => {
          e?.preventDefault?.();
          setError(null);
          if (tab === "signup") {
            if (!displayName.trim()) return setError("Pick a display name.");
            if (!email.trim() || !email.includes("@")) return setError("Enter a valid email.");
            if (!country) return setError("Pick your country — it's how the per-country leaderboard works.");
            onAuth({
              id: "u_" + Math.random().toString(36).slice(2, 10),
              displayName: displayName.trim(),
              email: email.trim().toLowerCase(),
              country,
              createdAt: new Date().toISOString(),
            });
          } else {
            // Mock sign-in: we have no backend, so just accept any email and
            // seed a default display name. Real impl: call samsports auth.
            if (!email.trim() || !email.includes("@")) return setError("Enter your email to sign in.");
            onAuth({
              id: "u_" + Math.random().toString(36).slice(2, 10),
              displayName: email.split("@")[0],
              email: email.trim().toLowerCase(),
              country: country || "OTHER",
              createdAt: new Date().toISOString(),
            });
          }
        };

        return (
          <div className="fixed inset-0 z-50 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4">
            <div className="w-full max-w-md rounded-2xl bg-slate-900 border border-slate-800 shadow-2xl overflow-hidden">
              <div className="flex items-center justify-between px-5 py-3 border-b border-slate-800">
                <div className="inline-flex items-center gap-2 font-semibold">
                  <Trophy className="h-4 w-4 text-emerald-300" />
                  Join the leaderboard
                </div>
                <button onClick={onClose} className="h-8 w-8 rounded-md hover:bg-slate-800 flex items-center justify-center"><X className="h-4 w-4" /></button>
              </div>
              <div className="p-5 space-y-4">
                <div className="inline-flex rounded-lg bg-slate-950 border border-slate-800 p-1 w-full">
                  <button onClick={()=>setTab("signup")} className={`flex-1 py-1.5 text-xs font-semibold rounded-md ${tab==="signup" ? "bg-slate-800 text-emerald-300" : "text-slate-400"}`}>Create account</button>
                  <button onClick={()=>setTab("signin")} className={`flex-1 py-1.5 text-xs font-semibold rounded-md ${tab==="signin" ? "bg-slate-800 text-emerald-300" : "text-slate-400"}`}>Sign in</button>
                </div>

                <form onSubmit={submit} className="space-y-3">
                  {tab === "signup" && (
                    <label className="block">
                      <div className="text-[11px] uppercase tracking-wider text-slate-400 mb-1">Display name</div>
                      <input
                        value={displayName} onChange={e=>setDisplayName(e.target.value)}
                        placeholder="e.g. StrikerKing07"
                        className="w-full bg-slate-950 border border-slate-800 rounded-md px-3 py-2 text-sm text-slate-100 focus:border-emerald-500/60 outline-none"
                      />
                    </label>
                  )}
                  <label className="block">
                    <div className="text-[11px] uppercase tracking-wider text-slate-400 mb-1">Email</div>
                    <input
                      type="email"
                      value={email} onChange={e=>setEmail(e.target.value)}
                      placeholder="you@example.com"
                      className="w-full bg-slate-950 border border-slate-800 rounded-md px-3 py-2 text-sm text-slate-100 focus:border-emerald-500/60 outline-none"
                    />
                  </label>
                  <label className="block">
                    <div className="text-[11px] uppercase tracking-wider text-slate-400 mb-1">
                      {tab === "signup" ? "Country" : "Country (optional)"}
                    </div>
                    <select
                      value={country} onChange={e=>setCountry(e.target.value)}
                      className="w-full bg-slate-950 border border-slate-800 rounded-md px-3 py-2 text-sm text-slate-100 focus:border-emerald-500/60 outline-none"
                    >
                      <option value="">— Select country —</option>
                      {COUNTRIES.map(c => (
                        <option key={c.code} value={c.code}>{c.flag} {c.name}</option>
                      ))}
                    </select>
                    {tab === "signup" && (
                      <div className="text-[11px] text-slate-500 mt-1">
                        Your country determines which national leaderboard you appear on.
                      </div>
                    )}
                  </label>

                  {error && (
                    <div className="rounded-md bg-rose-500/10 border border-rose-500/40 text-rose-200 text-xs px-3 py-2 flex items-start gap-2">
                      <AlertTriangle className="h-3.5 w-3.5 mt-0.5 flex-none" />
                      <span>{error}</span>
                    </div>
                  )}

                  <button type="submit" className="w-full rounded-lg bg-gradient-to-br from-emerald-400 to-cyan-500 text-slate-900 font-semibold text-sm py-2 hover:brightness-110">
                    {tab === "signup" ? "Create account & join leaderboard" : "Sign in"}
                  </button>

                  <div className="text-[11px] text-slate-500 leading-relaxed">
                    <b>Note for samsports:</b> this is a local-only demo. Wire to your real auth (samsports SSO, cookie/JWT) and persist predictions + scores server-side so rankings work across devices. See the embed snippet's integration notes.
                  </div>
                </form>
              </div>
            </div>
          </div>
        );
      }

      /* ---------- Share modal ---------- */
      function ShareModal({ onClose, champion, runnerUp, stats, shareLink, summary, copySummary, summaryCopied, copyLink, linkCopied, topScorer, yourRank }) {
        useEffect(() => {
          const onKey = e => e.key === "Escape" && onClose();
          window.addEventListener("keydown", onKey);
          return () => window.removeEventListener("keydown", onKey);
        }, [onClose]);
        return (
          <div className="fixed inset-0 z-50 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4">
            <div className="w-full max-w-lg rounded-2xl bg-slate-900 border border-slate-800 shadow-2xl overflow-hidden">
              <div className="flex items-center justify-between px-5 py-3 border-b border-slate-800">
                <div className="inline-flex items-center gap-2 font-semibold"><Share2 className="h-4 w-4 text-emerald-300" /> Your SamPoints Card</div>
                <button onClick={onClose} className="h-8 w-8 rounded-md hover:bg-slate-800 flex items-center justify-center"><X className="h-4 w-4" /></button>
              </div>
              <div className="p-5">
                <div className="relative rounded-2xl overflow-hidden border border-emerald-400/20 bg-gradient-to-br from-slate-950 via-emerald-950/40 to-cyan-950/40 p-6">
                  <div className="absolute -top-24 -right-24 h-48 w-48 bg-emerald-400/20 blur-3xl rounded-full" />
                  <div className="absolute -bottom-24 -left-24 h-48 w-48 bg-cyan-400/20 blur-3xl rounded-full" />
                  <div className="relative">
                    <div className="flex items-center gap-2 text-xs text-emerald-300 uppercase tracking-widest"><Trophy className="h-4 w-4" /> World Cup Prediction</div>
                    <div className="mt-5 flex flex-col items-center">
                      <Crown className="h-6 w-6 text-amber-300 mb-1" />
                      <div className="text-[10px] uppercase tracking-widest text-amber-300">Champion</div>
                      <div className="mt-3 h-16 w-16 flex items-center justify-center">
                        {champion?.logo ? <img src={champion.logo} alt="" className="h-16 w-16 object-contain" /> : <span className="text-6xl">🏆</span>}
                      </div>
                      <div className="font-bold text-white mt-2 text-2xl">{champion ? champion.name : "Undecided"}</div>
                      <div className="mt-4 flex items-center gap-2 text-sm text-slate-300">
                        <Medal className="h-4 w-4 text-slate-400" />
                        <span className="text-[11px] uppercase tracking-wider text-slate-400">Runner-up</span>
                        {runnerUp?.logo && <img src={runnerUp.logo} className="h-4 w-4" alt="" />}
                        <span className="font-medium">{runnerUp ? runnerUp.name : "TBD"}</span>
                      </div>
                    </div>
                    <div className="mt-6 grid grid-cols-3 gap-2">
                      <MiniStat label="SamPoints" value={fmtPts(stats.totalPoints)} tint="emerald" />
                      <MiniStat label="Picks" value={`${stats.madePicks}/${stats.totalMatches}`} tint="orange" />
                      <MiniStat label="Your rank" value={`#${yourRank}`} tint="cyan" />
                    </div>
                    <div className="mt-4 text-[11px] text-slate-400">Leader: <span className="text-slate-200">{topScorer?.name}</span>{" — "}<span className="text-emerald-300 font-semibold">{fmtPts(topScorer?.score)} pts</span></div>
                  </div>
                </div>
              </div>
              <div className="px-5 pb-5 space-y-2">
                <div className="rounded-lg bg-slate-950/80 border border-slate-800 p-3">
                  <div className="text-[11px] uppercase text-slate-500 mb-1">Prediction Link</div>
                  <div className="flex items-center gap-2">
                    <code className="text-xs text-cyan-200 truncate flex-1">{shareLink}</code>
                    <button onClick={copyLink} className="inline-flex items-center gap-1.5 px-2.5 py-1.5 rounded-md bg-slate-800 text-slate-200 text-xs hover:bg-slate-700">
                      {linkCopied ? <Check className="h-3.5 w-3.5 text-emerald-300" /> : <Copy className="h-3.5 w-3.5" />}
                      {linkCopied ? "Copied" : "Copy"}
                    </button>
                  </div>
                </div>
                <div className="rounded-lg bg-slate-950/80 border border-slate-800 p-3">
                  <div className="flex items-center justify-between mb-1">
                    <div className="text-[11px] uppercase text-slate-500">Share Summary</div>
                    <button onClick={copySummary} className="inline-flex items-center gap-1.5 px-2 py-1 rounded-md bg-slate-800 text-slate-200 text-xs hover:bg-slate-700">
                      {summaryCopied ? <Check className="h-3.5 w-3.5 text-emerald-300" /> : <Copy className="h-3.5 w-3.5" />}
                      {summaryCopied ? "Copied" : "Copy text"}
                    </button>
                  </div>
                  <pre className="whitespace-pre-wrap text-[11px] text-slate-300 leading-snug">{summary}</pre>
                </div>
                <div className="text-[11px] text-slate-500 text-center">Tip: screenshot the card above to share it on social media.</div>
              </div>
            </div>
          </div>
        );
      }

      function MiniStat({ label, value, tint }) {
        const palette = {
          emerald: "border-emerald-400/30 text-emerald-200",
          orange: "border-orange-400/30 text-orange-200",
          cyan: "border-cyan-400/30 text-cyan-200",
        }[tint];
        return (
          <div className={`rounded-lg border ${palette} bg-slate-950/50 p-2 text-center`}>
            <div className="text-[10px] uppercase tracking-wider opacity-80">{label}</div>
            <div className="font-bold text-white text-sm mt-0.5 truncate">{value}</div>
          </div>
        );
      }

      /* mount */
      document.getElementById("root-loading").remove();
      createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
