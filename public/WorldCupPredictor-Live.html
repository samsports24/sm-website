      ---------------------------------------------- */

      /* ═══ Backend API helpers ═══
         All predictor data is saved to the backend when the user is
         authenticated. localStorage is kept as a fallback for guests. */
      const API_BASE = window.location.origin; // same-origin backend
      const apiHeaders = (token) => ({
        "Content-Type": "application/json",
        ...(token ? { Authorization: `Bearer ${token}` } : {}),
      });

      // Save picks to backend (bulk)
      const apiSavePicks = async (token, picks, data, scores = {}) => {
        const body = [];
        const rankings = data?.fifaRankings || {};
        for (const [key, value] of Object.entries(picks)) {
          if (key.startsWith("g:")) {
            // Group match pick: key = "g:{fixtureId}", value = "A"|"B"|"D"
            const fixtureId = key.slice(2);
            const resultMap = { A: "home", B: "away", D: "draw" };
            // Find match in data for team info
            let homeTeam = null, awayTeam = null;
            for (const g of (data?.groups || [])) {
              const m = g.matches.find(m => String(m.id) === String(fixtureId));
              if (m) { homeTeam = m.teamA; awayTeam = m.teamB; break; }
            }
            // Upset multiplier
            let multiplier = 1;
            if (value !== "D" && homeTeam && awayTeam) {
              const winnerId = value === "A" ? homeTeam.id : awayTeam.id;
              const loserId = value === "A" ? awayTeam.id : homeTeam.id;
              const rW = rankings[winnerId], rL = rankings[loserId];
              if (rW && rL && rW > rL) multiplier = 2;
            }
            // Exact score predictions (bonus 50K SP)
            const sh = scores[`sh:${fixtureId}`];
            const sa = scores[`sa:${fixtureId}`];
            body.push({
              competition: "worldcup", leagueId: 1, season: 2026,
              pickType: "match", fixtureId: Number(fixtureId),
              pickResult: resultMap[value] || null,
              pickHomeScore: sh != null ? Number(sh) : null,
              pickAwayScore: sa != null ? Number(sa) : null,
              homeTeamId: homeTeam?.id || null, homeTeamName: homeTeam?.name || null,
              awayTeamId: awayTeam?.id || null, awayTeamName: awayTeam?.name || null,
              basePoints: 20000, multiplier,
            });
          } else if (key.startsWith("k:")) {
            // Knockout pick: key = "k:{matchId}", value = winnerId
            const matchId = key.slice(2);
            // Find the round for point assignment
            let round = null, basePoints = 0, homeTeam = null, awayTeam = null;
            const ko = data?.knockout || {};
            for (const [rKey, matches] of Object.entries(ko)) {
              const arr = Array.isArray(matches) ? matches : (matches ? [matches] : []);
              const m = arr.find(m => String(m.id) === String(matchId));
              if (m) {
                round = rKey === "f" ? "final" : rKey;
                homeTeam = m.teamA; awayTeam = m.teamB;
                const ptMap = { r32: 75000, r16: 150000, qf: 200000, sf: 500000, third: 350000, f: 1000000 };
                basePoints = ptMap[rKey] || 0;
                break;
              }
            }
            let multiplier = 1;
            if (homeTeam && awayTeam) {
              const loserId = String(value) === String(homeTeam.id) ? awayTeam.id : homeTeam.id;
              const rW = rankings[value], rL = rankings[loserId];
              if (rW && rL && rW > rL) multiplier = 2;
            }
            // Exact score predictions for knockout matches
            const ksh = scores[`sh:${matchId}`];
            const ksa = scores[`sa:${matchId}`];
            body.push({
              competition: "worldcup", leagueId: 1, season: 2026,
              pickType: "knockout", fixtureId: Number(matchId),
              pickTeamId: Number(value), round,
              pickHomeScore: ksh != null ? Number(ksh) : null,
              pickAwayScore: ksa != null ? Number(ksa) : null,
              homeTeamId: homeTeam?.id || null, homeTeamName: homeTeam?.name || null,
              awayTeamId: awayTeam?.id || null, awayTeamName: awayTeam?.name || null,
              basePoints, multiplier,
            });
          }
          // tie: picks are local-only (tiebreak ordering for standings display)
        }
        if (body.length === 0) return { saved: 0 };
        const resp = await fetch(`${API_BASE}/predictor/picks/bulk`, {
          method: "POST",
          headers: apiHeaders(token),
          body: JSON.stringify({ picks: body }),
        });
        if (!resp.ok) throw new Error(`Save failed: ${resp.status}`);
        return resp.json();
      };

            if (p.pickAwayScore != null) scores[`sa:${p.fixtureId}`] = p.pickAwayScore;
          } else if (p.pickType === "knockout" && p.fixtureId) {
            picks[`k:${p.fixtureId}`] = p.pickTeamId;
          }
        }
        return { picks, scores, stats: data?.stats || null };

      /* --------------------------------------------
         API-Football client
      ---------------------------------------------- */
      async function apiFetch(path, apiKey) {
        const url = `https://v3.football.api-sports.io${path}`;
        const res = await fetch(url, { headers: { "x-apisports-key": apiKey } });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (data.errors && (Array.isArray(data.errors) ? data.errors.length : Object.keys(data.errors).length)) {
          const msg = Array.isArray(data.errors) ? data.errors.join("; ") : Object.values(data.errors).join("; ");
          throw new Error(msg);
        }
        return data.response || [];
      }

      async function loadTournament({ apiKey, league, season }) {
        const [fixtures, standingsResp, rankingsResp] = await Promise.all([
          apiFetch(`/fixtures?league=${league}&season=${season}`, apiKey),
          apiFetch(`/standings?league=${league}&season=${season}`, apiKey).catch(() => []),
          // FIFA World Rankings — league 0 is the special "world ranking" pseudo-league
          apiFetch(`/standings?league=0&season=${new Date().getFullYear()}`, apiKey).catch(() => []),
        ]);
        // standingsResp shape: [{ league: { standings: [[...groupA], [...groupB], ...] } }]
        let standings = null;
        if (Array.isArray(standingsResp) && standingsResp[0]?.league?.standings) {
          standings = standingsResp[0].league.standings;
        }
        // Build FIFA ranking map: team.id → rank (1 = best)
        const fifaRankings = {};
        try {
          const ranks = rankingsResp?.[0]?.league?.standings?.[0] || [];
          ranks.forEach(r => {
            if (r.team?.id && r.rank) fifaRankings[r.team.id] = r.rank;
          });
        } catch (_) { /* rankings unavailable — degrade gracefully */ }
        return { fixtures, standings, fifaRankings };
      }

      /* --------------------------------------------
         Parse fixtures → our internal shape
      ---------------------------------------------- */
      const TEAM_CODE_OVERRIDES = {
        // Friendly 3-letter codes when API name doesn't slice nicely
        "United States": "USA", "USA": "USA", "South Korea": "KOR", "Korea Republic":"KOR",
        "IR Iran": "IRN", "Saudi Arabia": "KSA", "Costa Rica": "CRC", "Ivory Coast":"CIV",
        "Côte d'Ivoire": "CIV", "Czech Republic":"CZE", "New Zealand":"NZL",
        "Trinidad and Tobago":"TRI", "Bosnia and Herzegovina":"BIH", "North Macedonia":"MKD"
      };

      function teamShape(t) {
        if (!t || !t.id) return null;
        const name = t.name || "Unknown";
        const code = TEAM_CODE_OVERRIDES[name] || name.replace(/[^A-Za-z]/g,"").slice(0,3).toUpperCase();
        return { id: t.id, name, code, logo: t.logo || null, flag: "🏳️" };
      }

      function detectKoKey(round) {
        const r = (round || "").toLowerCase();
        if (r.includes("round of 32") || r.includes("1/16")) return "r32";
        if (r.includes("round of 16") || r.includes("1/8") || r.includes("8th final")) return "r16";
        if (r.includes("quarter") || r.includes("1/4")) return "qf";
        if (r.includes("semi") || r.includes("1/2")) return "sf";
        if (r.includes("3rd place") || r.includes("third place") || r.includes("play-off for 3rd")) return "third";
        if (r.includes("final")) return "f";
        return null;
      }

      // Extract group letter from names like "Group A", "FIFA World Cup - Group A", etc.
      // The negative lookahead [a-zA-Z] prevents "Group Stage" from matching as letter "S".
      function extractGroupLetter(name) {
        if (!name) return null;
        const m = name.match(/Group\s+([A-Z])(?![a-zA-Z])/i);
        return m ? m[1].toUpperCase() : null;
      }

      function parseFixtures(fixtures, standings) {
        const groupsMap = new Map();
        const knockout = { r32:[], r16:[], qf:[], sf:[], third:null, f:null };
        // team-id → group letter lookup (seeded from /standings)
        const teamToGroup = new Map();

        // 1. Seed groups from standings (authoritative source)
        if (standings && Array.isArray(standings)) {
          for (const groupArr of standings) {
            if (!Array.isArray(groupArr) || !groupArr.length) continue;
            const letter = extractGroupLetter(groupArr[0].group);
            if (!letter) continue;
            if (!groupsMap.has(letter)) {
              groupsMap.set(letter, { letter, teams: [], matches: [] });
            }
            const g = groupsMap.get(letter);
            for (const entry of groupArr) {
              const t = teamShape(entry.team);
              if (!t) continue;
              if (!g.teams.find(x => x.id === t.id)) g.teams.push(t);
              teamToGroup.set(entry.team.id, letter);
            }
          }
        }

        // Sort fixtures by timestamp so within-group ordering is stable
        const sorted = [...fixtures].sort((a,b) =>
          (a.fixture?.timestamp || 0) - (b.fixture?.timestamp || 0)
        );

        for (const fix of sorted) {
          const round = fix.league?.round || "";
          const teamA = teamShape(fix.teams?.home);
          const teamB = teamShape(fix.teams?.away);
          if (!teamA || !teamB) continue;

          const status = fix.fixture?.status?.short || "NS";
          const gh = fix.goals?.home, ga = fix.goals?.away;
          let actual = null;
          if (status === "FT" || status === "AET" || status === "PEN") {
            if (gh > ga) actual = "A";
            else if (gh < ga) actual = "B";
            else actual = "D";
          }

          const match = {
            id: fix.fixture.id,
            date: fix.fixture.date,
            venue: fix.fixture.venue?.name || null,
            status, actual,
            score: { home: gh, away: ga },
            teamA, teamB,
            result: null,      // user's group-stage prediction
            winner: null,      // user's knockout prediction
          };

          // 2. Knockout? detect by round name
          const ko = detectKoKey(round);
          if (ko) {
            if (ko === "third") knockout.third = { ...match };
            else if (ko === "f") knockout.f = { ...match };
            else knockout[ko].push({ ...match });
            continue;
          }

          // 3. Group stage via standings lookup (most reliable)
          const lA = teamToGroup.get(fix.teams?.home?.id);
          const lB = teamToGroup.get(fix.teams?.away?.id);
          if (lA && lA === lB) {
            const g = groupsMap.get(lA);
            if (g) g.matches.push(match);
            continue;
          }

          // 4. Fallback: extract letter from round name (e.g. "Group A - 1")
          const letter = extractGroupLetter(round);
          if (letter) {
            if (!groupsMap.has(letter)) {
              groupsMap.set(letter, { letter, teams: [], matches: [] });
            }
            const g = groupsMap.get(letter);
            g.matches.push(match);
            if (!g.teams.find(t=>t.id===teamA.id)) g.teams.push(teamA);
            if (!g.teams.find(t=>t.id===teamB.id)) g.teams.push(teamB);
          }
          // else: unmatched — drop (pre-tournament friendlies, qualifiers leftover, etc.)
        }

        const groups = [...groupsMap.values()].sort((a,b)=>a.letter.localeCompare(b.letter));
        return { groups, knockout };
      }

          ["G", [["Portugal","POR","🇵🇹"],["Serbia","SRB","🇷🇸"],["Japan","JPN","🇯🇵"],["Costa Rica","CRC","🇨🇷"]]],
          ["H", [["Spain","ESP","🇪🇸"],["Belgium","BEL","🇧🇪"],["Cameroon","CMR","🇨🇲"],["Cape Verde","CPV","🇨🇻"]]],
          ["I", [["England","ENG","🏴󠁧󠁢󠁥󠁮󠁧󠁿"],["Czech Republic","CZE","🇨🇿"],["Ivory Coast","CIV","🇨🇮"],["Jamaica","JAM","🇯🇲"]]],

          ["K", [["Netherlands","NED","🇳🇱"],["Hungary","HUN","🇭🇺"],["South Korea","KOR","🇰🇷"],["Uruguay","URU","🇺🇾"]]],
          ["L", [["Italy","ITA","🇮🇹"],["Norway","NOR","🇳🇴"],["Algeria","ALG","🇩🇿"],["Australia","AUS","🇦🇺"]]],

        let id = -1;
        return raw.map(([letter, teams]) => ({

      })();
      function buildMock() {
        const groups = MOCK_GROUPS.map(g => ({
          letter: g.letter, teams: g.teams,
          matches: [[0,1],[2,3],[0,2],[1,3],[0,3],[1,2]].map(([a,b]) => ({

            teamA: g.teams[a], teamB: g.teams[b],
            result: null, actual:null, status:"NS", date:null, venue:null, score:{home:null,away:null}

        }));
        return { groups, knockout: { r32:[], r16:[], qf:[], sf:[], third:null, f:null } };

      /* --------------------------------------------
         Compute standings for a group

         Because users pick match *outcomes* (W/D/L) and not scores,
         we can't compute goal difference — FIFA's real tiebreakers
         (GD → goals-for → head-to-head) are unavailable here.
         When teams tie on points+wins, we let the user set the order
         manually. `tieOrder` is an array of teamIds in user-chosen
         rank for this group.
      ---------------------------------------------- */
      function computeStandings(group, tieOrder) {
        const s = {};
        group.teams.forEach(t => s[t.id] = { team:t, played:0, won:0, drew:0, lost:0, points:0 });
        let played = 0;
        group.matches.forEach(m => {
          const r = m.result || m.actual;
          if (!r) return;
          played++;
          const A = s[m.teamA.id], B = s[m.teamB.id];
          if (!A || !B) return;
          A.played++; B.played++;
          if (r === "A") { A.won++; A.points+=3; B.lost++; }
          else if (r === "B") { B.won++; B.points+=3; A.lost++; }
          else { A.drew++; B.drew++; A.points+=1; B.points+=1; }
        });

        const userRank = new Map();
        if (Array.isArray(tieOrder)) {
          tieOrder.forEach((id, i) => userRank.set(String(id), i));
        }

        const standings = Object.values(s).sort((a,b) => {
          if (b.points !== a.points) return b.points - a.points;
          if (b.won !== a.won) return b.won - a.won;
          // Apply user tie-break order before falling back to alpha
          const au = userRank.get(String(a.team.id));
          const bu = userRank.get(String(b.team.id));
          if (au != null && bu != null) return au - bu;
          if (au != null) return -1;
          if (bu != null) return 1;
          return a.team.name.localeCompare(b.team.name);
        });

        // Identify tie clusters (same points+wins = tied from rules POV)
        const tieClusters = [];
        let cur = [];
        for (let i = 0; i < standings.length; i++) {
          if (i > 0
              && standings[i].points === standings[i-1].points
              && standings[i].won   === standings[i-1].won) {
            if (!cur.length) cur = [i-1];
            cur.push(i);
          } else {
            if (cur.length > 1) tieClusters.push(cur);
            cur = [];
          }
        }
        if (cur.length > 1) tieClusters.push(cur);

        // Only surface as "needs resolution" if a tie crosses a critical
        // boundary: 1st↔2nd (who wins the group), 2nd↔3rd (who is runner-up
        // vs 3rd-place candidate), or within the 3rd-place cluster.
        const needsResolution = tieClusters.some(c => c[0] <= 2);

        const total = group.matches.length || 6;
        return { standings, allPlayed: played === total, tieClusters, needsResolution };
      }

      /* --------------------------------------------
         FIFA 2026 official knockout bracket template

         Source: FIFA match-schedule pages (match numbers 73-104).
         Codes used:
           "1X"  = winner of group X
           "2X"  = runner-up of group X
           "3/A/B/C/D/F" = the 3rd-placed team from one of groups A,B,C,D or F
                           (actual assignment is from FIFA's 495-scenario table;
                            we approximate greedily — see assignThirds below)
           "W<n>" = winner of match number <n>

         R32 matches are labeled 73..88 to match the official numbering.
         R16 → 89..96, QF → 97..100, SF → 101..102, 3rd → 103, Final → 104.
      ---------------------------------------------- */
      const FIFA_R32 = [
        { n: 73, a: "2A", b: "2B" },
        { n: 74, a: "1E", b: "3/A/B/C/D/F" },
        { n: 75, a: "1F", b: "2C" },
        { n: 76, a: "1C", b: "2F" },
        { n: 77, a: "1I", b: "3/C/D/F/G/H" },
        { n: 78, a: "2E", b: "2I" },
        { n: 79, a: "1A", b: "3/C/E/F/H/I" },
        { n: 80, a: "1L", b: "3/E/H/I/J/K" },
        { n: 81, a: "1D", b: "3/B/E/F/I/J" },
        { n: 82, a: "1G", b: "3/A/E/H/I/J" },
        { n: 83, a: "2K", b: "2L" },
        { n: 84, a: "1H", b: "2J" },
        { n: 85, a: "1B", b: "3/E/F/G/I/J" },
        { n: 86, a: "1J", b: "2H" },
        { n: 87, a: "1K", b: "3/D/E/I/J/L" },
        { n: 88, a: "2D", b: "2G" },
      ];
      const FIFA_R16 = [
        { n: 89, a: 74, b: 77 },
        { n: 90, a: 73, b: 75 },
        { n: 91, a: 76, b: 78 },
        { n: 92, a: 79, b: 80 },
        { n: 93, a: 83, b: 84 },
        { n: 94, a: 81, b: 82 },
        { n: 95, a: 86, b: 88 },
        { n: 96, a: 85, b: 87 },
      ];
      const FIFA_QF = [
        { n:  97, a: 89, b: 90 },
        { n:  98, a: 93, b: 94 },
        { n:  99, a: 91, b: 92 },
        { n: 100, a: 95, b: 96 },
      ];
      const FIFA_SF = [
        { n: 101, a:  97, b:  98 },
        { n: 102, a:  99, b: 100 },
      ];
      const FIFA_THIRD = { n: 103, a: 101, b: 102 };
      const FIFA_FINAL = { n: 104, a: 101, b: 102 };

      /* Parse a slot code into { kind, payload }. */
      function parseSlot(code) {
        if (code[0] === "1" || code[0] === "2") {
          return { kind: "place", place: +code[0], letter: code[1] };
        }
        if (code[0] === "3") {
          // "3/A/B/C/D/F" => allowed groups
          const parts = code.split("/").slice(1);
          return { kind: "third", allowed: parts };
        }
        throw new Error("bad slot " + code);
      }

      /* Assign the 8 best 3rd-placed teams to FIFA's 8 third-place slots.
         Real FIFA uses a pre-computed 495-scenario table keyed on the set
         of 8 groups that qualify. We approximate greedily:
           1) Sort the 8 qualifying 3rd-placed teams by rank.
           2) Walk the 8 slots in match-number order (74, 77, 79, 80, 81,
              82, 85, 87) and give each slot the highest-ranked 3rd that
              is (a) from an allowed group and (b) not yet assigned.
         This yields a valid bracket that respects FIFA's "no same-group
         R32 matchup" constraint. It matches FIFA in the common cases but
         not every edge scenario of the 495-entry table.
      ---------------------------------------------- */
      function assignThirds(rankedThirds) {
        const slots = FIFA_R32.filter(m => m.a[0] === "3" || m.b[0] === "3");
        const assignment = {}; // match number -> team
        const used = new Set();
        const pool = rankedThirds.slice(); // already best->worst

        // First pass: strict — only accept teams from allowed groups.
        slots.forEach(m => {
          const code = m.a[0] === "3" ? m.a : m.b;
          const parsed = parseSlot(code);
          const pick = pool.find(t =>
            parsed.allowed.includes(t.groupLetter) && !used.has(t.team.id)
          );
          if (pick) { assignment[m.n] = pick.team; used.add(pick.team.id); }
        });
        // Second pass: fallback if a slot wasn't satisfied (can happen
        // when the set of 8 qualifying groups doesn't include any from
        // a slot's allowed list — rare). Assign any remaining team.
        slots.forEach(m => {
          if (assignment[m.n]) return;
          const pick = pool.find(t => !used.has(t.team.id));
          if (pick) { assignment[m.n] = pick.team; used.add(pick.team.id); }
        });
        return assignment;
      }

      function resolveSlot(code, groupStandings, thirdsAssignment, matchNumber) {
        const p = parseSlot(code);
        if (p.kind === "place") {
          const gs = groupStandings.find(g => g.letter === p.letter);
          if (!gs || !gs.allPlayed) return null;
          return gs.standings[p.place - 1]?.team || null;
        }
        // 3rd-placed slot — look up which R32 match this is
        return thirdsAssignment[matchNumber] || null;
      }

      function makeDerivedMatch(id, teamA, teamB, userPicks) {
        const wid = userPicks[`k:${id}`];
        let winner = null;
        if (wid != null) {
          if (teamA && String(teamA.id) === String(wid)) winner = teamA;
          else if (teamB && String(teamB.id) === String(wid)) winner = teamB;
        }
        return {
          id, teamA, teamB, winner,
          status: "NS", date: null, venue: null,
          score: { home: null, away: null }, actual: null,
        };
      }

      /* --------------------------------------------
         Derive bracket from group picks (used when
         API didn't provide knockout fixtures yet).
      ---------------------------------------------- */
      function deriveDownstream(data, userPicks) {
        // 1) standings per group (apply user tiebreak orders)
        const groupStandings = data.groups.map(g => ({
          letter: g.letter,
          ...computeStandings(g, userPicks[`tie:${g.letter}`]),
        }));

        // 2) rank 3rd-placed teams, keep the 8 best (FIFA rule)
        const thirdsPool = groupStandings
          .map(gs => ({
            groupLetter: gs.letter,
            team: gs.standings[2]?.team,
            entry: gs.standings[2],
            allPlayed: gs.allPlayed,
          }))
          .filter(x => x.team && x.allPlayed);
        const rankedThirds = thirdsPool
          .sort((a, b) => {
            if (b.entry.points !== a.entry.points) return b.entry.points - a.entry.points;
            if (b.entry.won !== a.entry.won) return b.entry.won - a.entry.won;
            return a.groupLetter.localeCompare(b.groupLetter);
          })
          .slice(0, 8);

        // 3) assign 3rds to the 8 FIFA slots
        const thirdsAssignment = assignThirds(rankedThirds);

        // 4) R32 from FIFA pairings
        const r32 = FIFA_R32.map(m => {
          const teamA = resolveSlot(m.a, groupStandings, thirdsAssignment, m.n);
          const teamB = resolveSlot(m.b, groupStandings, thirdsAssignment, m.n);
          return { ...makeDerivedMatch(`d-m${m.n}`, teamA, teamB, userPicks), matchNum: m.n };
        });

        const byNum = Object.fromEntries(r32.map(m => [m.matchNum, m]));

        const buildFromPrev = (template) => template.map(spec => {
          const A = byNum[spec.a]?.winner || null;
          const B = byNum[spec.b]?.winner || null;
          const m = { ...makeDerivedMatch(`d-m${spec.n}`, A, B, userPicks), matchNum: spec.n };
          byNum[spec.n] = m;
          return m;
        });

        const r16 = buildFromPrev(FIFA_R16);
        const qf  = buildFromPrev(FIFA_QF);
        const sf  = buildFromPrev(FIFA_SF);

        // Final (102's winner vs 101's winner)
        const [sfA, sfB] = sf;
        const finalA = sfA?.winner || null;
        const finalB = sfB?.winner || null;
        const thirdA = sfA && sfA.winner && sfA.teamA && sfA.teamB
          ? (sfA.winner.id === sfA.teamA.id ? sfA.teamB : sfA.teamA) : null;
        const thirdB = sfB && sfB.winner && sfB.teamA && sfB.teamB
          ? (sfB.winner.id === sfB.teamA.id ? sfB.teamB : sfB.teamA) : null;

        const f     = { ...makeDerivedMatch(`d-m${FIFA_FINAL.n}`, finalA, finalB, userPicks), matchNum: FIFA_FINAL.n };
        const third = { ...makeDerivedMatch(`d-m${FIFA_THIRD.n}`, thirdA, thirdB, userPicks), matchNum: FIFA_THIRD.n };

        return { r32, r16, qf, sf, third, f };
      }

      /* --------------------------------------------
         App
      ---------------------------------------------- */
      function App() {

        /* ---------- Account (MOCK auth — replace with samsports real auth) ---------- */

        useEffect(() => {

                const wid = userPicks[`k:${m.id}`];

                  m.winner = (m.teamA && String(m.teamA.id) === String(wid))
                    ? m.teamA
                    : (m.teamB && String(m.teamB.id) === String(wid)) ? m.teamB : null;
                }

              else {
                const wid = userPicks[`k:${v.id}`];
                if (wid != null) {
                  v.winner = (v.teamA && String(v.teamA.id) === String(wid))
                    ? v.teamA
                    : (v.teamB && String(v.teamB.id) === String(wid)) ? v.teamB : null;
                }
              }
            });
          }
          clone.fifaRankings = data.fifaRankings || {};

        }, [data, userPicks]);

        /* Load live data */
        const handleLoad = useCallback(async () => {
          if (!apiKey) { setError("Paste your API-Football key first."); return; }

          try {
            const { fixtures, standings, fifaRankings } = await loadTournament({
              apiKey, league: Number(league), season: Number(season)
            });
            setFixturesCount(fixtures.length);
            if (!fixtures.length) {
              setError(`No fixtures returned for league=${league}, season=${season}. The draw may not be finalized yet. Showing mock data.`);
              setSource("mock");
              return;

            const parsed = parseFixtures(fixtures, standings);
            parsed.fifaRankings = fifaRankings || {};
            if (!parsed.groups.length && !parsed.knockout.r16.length && !parsed.knockout.r32.length) {
              setError(`Fixtures returned but no group/knockout structure detected. Draw may not be finalized.`);
              setSource("mock");
              return;

            setData(parsed);
            setSource("live");
            localStorage.setItem(LS_KEY, apiKey);
            localStorage.setItem(LS_SEASON, season);
            localStorage.setItem(LS_LEAGUE, league);
            try { localStorage.setItem(LS_CACHE, JSON.stringify(parsed)); } catch {}
            setUserPicks({}); // fresh start

            setError(`Failed: ${e.message}`);
          } finally {
            setLoading(false);
          }
        }, [apiKey, league, season]);

        /* Auto-load on mount if API key is present and we don't have live/cache data yet */
        useEffect(() => {
          if (apiKey && source !== "live" && !loading) {

        const [confirmModal, setConfirmModal] = useState(null); // null | { title, message, onConfirm }
        const resetPicks = () => {

            onConfirm: async () => {

              // The user simply starts fresh on the frontend.

        /* Count how many picks are different between draft and saved */
        const unsavedCount = useMemo(() => {
          let n = 0;
          const keys = new Set([...Object.keys(userPicks), ...Object.keys(savedPicks)]);
          keys.forEach(k => {
            if (String(userPicks[k] ?? "") !== String(savedPicks[k] ?? "")) n++;
          });
          return n;
        }, [userPicks, savedPicks]);

        const [saving, setSaving] = useState(false);
        const savePicks = useCallback(async () => {
          try {
            // Always save to localStorage as cache
            localStorage.setItem(LS_PICKS, JSON.stringify(userPicks));
            // Also save exact scores to localStorage
            try { localStorage.setItem("wcp.scores.v1", JSON.stringify(scores)); } catch {}

            // If authenticated, also save to backend
            if (authToken) {
              setSaving(true);
              try {
                await apiSavePicks(authToken, userPicks, data, scores);
              } catch (apiErr) {
                console.warn("[WCP] Backend save failed, localStorage saved:", apiErr.message);
                // Don't block — localStorage save succeeded
              } finally {
                setSaving(false);
              }
            }

            setSavedPicks({ ...userPicks });
            setSaveToast(true);
            setTimeout(() => setSaveToast(false), 2000);
          } catch (e) {
            setError(`Could not save: ${e.message}`);
          }
        }, [userPicks, scores, authToken, data]);

        /* Ctrl/Cmd+S keyboard shortcut */
        useEffect(() => {
          const onKey = (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === "s") {
              e.preventDefault();
              if (unsavedCount > 0) savePicks();
            }
          };
          window.addEventListener("keydown", onKey);
          return () => window.removeEventListener("keydown", onKey);
        }, [unsavedCount, savePicks]);

        /* Picks */
        const setGroupResult = (matchId, r) => setUserPicks(p => {
          const key = `g:${matchId}`;
          const next = { ...p };
          if (p[key] === r) delete next[key]; else next[key] = r;
          return next;
        });
        const setKoWinner = (matchId, teamId) => setUserPicks(p => {
          const key = `k:${matchId}`;
          const next = { ...p };
          if (String(p[key]) === String(teamId)) delete next[key]; else next[key] = teamId;
          return next;
        });

        /* Exact score handler */
        const handleScoreChange = (matchId, side, value) => {
          const num = value === "" ? null : Math.max(0, parseInt(value) || 0);
          const key = side === "home" ? `sh:${matchId}` : `sa:${matchId}`;
          setScores(prev => ({ ...prev, [key]: num }));
        };

        /* Tiebreak: move a team up one slot within its tied cluster */
        const bumpTieTeamUp = (groupLetter, teamId) => setUserPicks(p => {
          const key = `tie:${groupLetter}`;
          // Find the group + current standings with current override
          const group = data.groups.find(g => g.letter === groupLetter);
          if (!group) return p;
          // Apply group-level picks so standings reflect current draft
          const gClone = JSON.parse(JSON.stringify(group));
          gClone.matches.forEach(m => {
            const pr = p[`g:${m.id}`];
            if (pr) m.result = pr;
          });
          const { standings, tieClusters } = computeStandings(gClone, p[key]);
          const idx = standings.findIndex(s => String(s.team.id) === String(teamId));
          if (idx <= 0) return p;
          // Is this team part of a tie cluster and not already at its top?
          const cluster = tieClusters.find(c => c.includes(idx));
          if (!cluster || idx === cluster[0]) return p;
          // Build a new full-group ordering with `teamId` swapped above its predecessor
          const newOrder = standings.map(s => s.team.id);
          [newOrder[idx-1], newOrder[idx]] = [newOrder[idx], newOrder[idx-1]];
          return { ...p, [key]: newOrder };
        });

        /* Stats

           We compute TWO point totals:

             - projectedPoints: what the user would have if every pick
               is correct. This is what shows on the leaderboard and
               drives the Bragging Rights card. Grows as they pick.

             - settledPoints: SamPoints actually banked. A pick only
               banks SamPoints when the match has an `actual` result
               AND the user's pick matches it. This is what's spendable
               in samsports fantasy. Before the tournament starts, the
               SamPoints balance is 0 — so users can't farm it by
               filling in picks.

           The "same points that they can use playing fantasy" rule: one
           settled predictor point = one SamPoint = one fantasy-game
           point. 1:1. No conversion tax.
        ---------------------------------------------- */
        const stats = useMemo(() => {
          const rankings = merged.fifaRankings || {};
          /* Upset helper: returns 2x if the picked winner is lower-ranked
             (higher rank number) than the opponent. Otherwise 1x. */
          const upsetMulti = (winId, loseId) => {
            const rW = rankings[winId], rL = rankings[loseId];
            if (!rW || !rL) return 1;     // unknown ranking → no bonus
            return rW > rL ? 2 : 1;       // higher number = lower ranked = upset
          };

          /* Group matches */
          let gp=0, gpts=0, gu=0, gSettled=0, gSettledPicks=0;
          merged.groups.forEach(g => g.matches.forEach(m => {
            if (!m.result) return;
            gp++;
            const isUpset = m.result !== "D" && m.teamA && m.teamB;
            const winnerId = m.result === "A" ? m.teamA.id : m.result === "B" ? m.teamB.id : null;
            const loserId  = m.result === "A" ? m.teamB.id : m.result === "B" ? m.teamA.id : null;
            const multi = (isUpset && winnerId && loserId) ? upsetMulti(winnerId, loserId) : 1;
            if (multi > 1) gu++;
            gpts += POINTS.group * multi;
            if (m.actual && m.actual === m.result) {
              gSettled += POINTS.group * multi;
              gSettledPicks++;
            }
          }));
          /* Group positions: +50k per team that finishes in its predicted
             position. We score up to 4 rows per group (pos 1..4) and
             only settle positions when every match in the group is played.
             Uses the tiebreak-aware computeStandings which respects the
             user's tie order. "Actual" standings come from matches'
             `actual` fields (same logic, just using actuals). */
          let posProjected=0, posSettled=0;
          merged.groups.forEach(g => {
            // Predicted standings from user picks:
            const pred = computeStandings(g, userPicks[`tie:${g.letter}`]);
            if (pred.allPlayed) {
              // If the user has picked every match, award projected position points.
              posProjected += pred.standings.length * POINTS.groupPosition;
            } else {
              posProjected += pred.standings.filter(s => s.played > 0).length * POINTS.groupPosition;
            }
            // Actual standings: build a synthetic group where each match's
            // result is its actual outcome. Only score if every match has
            // actually been played.
            const allActual = g.matches.every(m => m.actual);
            if (!allActual) return;
            const actualG = JSON.parse(JSON.stringify(g));
            actualG.matches.forEach(m => { m.result = m.actual; });
            const act = computeStandings(actualG);
            pred.standings.forEach((p, i) => {
              const a = act.standings[i];
              if (a && String(a.team.id) === String(p.team.id)) {
                posSettled += POINTS.groupPosition;
              }
            });
          });

          /* Knockout */
          let kp=0, kpts=0, kSettled=0, kSettledPicks=0;
          const tally = (m, base) => {
            if (!m) return;
            if (m.winner && m.teamA && m.teamB) {
              const loserId = m.winner.id === m.teamA.id ? m.teamB.id : m.teamA.id;
              const multi = upsetMulti(m.winner.id, loserId);
              kp++;
              kpts += base * multi;
              if (m.actual) {
                const winnerSide = m.winner.id === m.teamA.id ? "A" : "B";
                if (m.actual === winnerSide) {
                  kSettled += base * multi;
                  kSettledPicks++;
                }
              }
            } else if (m.winner) {
              kp++; kpts += base;
            }
          };
          merged.knockout.r32.forEach(m => tally(m, POINTS.r32));
          merged.knockout.r16.forEach(m => tally(m, POINTS.r16));
          merged.knockout.qf.forEach(m => tally(m, POINTS.qf));
          merged.knockout.sf.forEach(m => tally(m, POINTS.sf));
          tally(merged.knockout.third, POINTS.third);
          tally(merged.knockout.f, POINTS.final);

          const totalGroup = merged.groups.reduce((n,g)=>n+g.matches.length,0);
          const totalKo = merged.knockout.r32.length + merged.knockout.r16.length +
                          merged.knockout.qf.length + merged.knockout.sf.length +
                          (merged.knockout.third?1:0) + (merged.knockout.f?1:0);
          return {
            groupPicks:gp, groupPoints:gpts, groupUpsets:gu,
            groupPositionsProjected: posProjected,
            groupPositionsSettled:  posSettled,
            koPicks:kp, koPoints:kpts,
            totalMatches: totalGroup + totalKo,
            madePicks: gp+kp,
            totalPoints:  gpts + kpts + posProjected,
            settledPoints: gSettled + kSettled + posSettled,
            settledPicks: gSettledPicks+kSettledPicks,
            upsets: gu,
            totalGroup, totalKo
          };
        }, [merged, userPicks]);

        const champion = merged.knockout.f?.winner || null;
        const f = merged.knockout.f;
        const runnerUp = f?.winner && f?.teamA && f?.teamB
          ? (f.winner.id === f.teamA.id ? f.teamB : f.teamA) : null;

        /* Share */
        const predictionCode = useMemo(() => {
          try { return btoa(JSON.stringify(userPicks)).replace(/=+$/,""); }
          catch { return ""; }
        }, [userPicks]);
        const shareLink = `https://samsports.io/world-cup/predictor/${predictionCode.slice(0,16)}`;
        const copyLink = async () => {
          try { await navigator.clipboard.writeText(shareLink);
            setLinkCopied(true); setTimeout(()=>setLinkCopied(false),1800); } catch {}
        };
        const shareSummary = useMemo(() => [
          `🏆 My World Cup Prediction`,
          champion ? `Champion: ${champion.name}` : `Champion: TBD`,
          runnerUp ? `Runner-up: ${runnerUp.name}` : `Runner-up: TBD`,
          `SamPoints: ${fmtPts(stats.totalPoints)} projected · ${fmtPts(stats.settledPoints)} banked`,
          `🔗 ${shareLink}`,
        ].join("\n"), [champion, runnerUp, stats, shareLink]);
        const copySummary = async () => {
          try { await navigator.clipboard.writeText(shareSummary);
            setSummaryCopied(true); setTimeout(()=>setSummaryCopied(false),1800); } catch {}
        };

        /* Community leaderboard — loaded from backend */
        const [lbData, setLbData] = useState([]);
        useEffect(() => {
          let cancelled = false;
          (async () => {
            try {
              const rows = await apiLoadLeaderboard();
              if (!cancelled) setLbData(rows);
            } catch (err) {
              console.warn("[WCP] Leaderboard load failed:", err.message);
            }
          })();
          return () => { cancelled = true; };
        }, []);
        // Refresh leaderboard when user saves picks
        useEffect(() => {
          if (!saveToast) return; // only refresh after a save
          (async () => {
            try {
              const rows = await apiLoadLeaderboard();
              setLbData(rows);
            } catch {}
          })();
        }, [saveToast]);

        const leaderboard = useMemo(() => {
          // Map backend data to display format
          const serverRows = lbData.map(r => ({
            name: r.userName || `${r.firstName || ""} ${r.lastName || ""}`.trim() || "Anonymous",
            country: r.country || "",
            score: r.totalAwarded || 0,
            projected: r.totalProjected || 0,
            accuracy: r.accuracy || 0,
            correctPicks: r.correctPicks || 0,
            isUser: account && String(r._id) === String(account.id),
          }));
          // If user is authenticated but not in the server leaderboard yet, add them
          const meInLb = account && serverRows.some(r => r.isUser);
          const meRow = (account && !meInLb) ? [{
            isUser: true,
            name: account.displayName,
            country: account.country,
            score: backendStats?.totalAwarded || 0,
            projected: stats.totalPoints,
            accuracy: backendStats?.accuracy || 0,
            correctPicks: backendStats?.correctCount || 0,
          }] : [];
          return [...serverRows, ...meRow]
            .sort((a,b) => (b.score || 0) - (a.score || 0) || (b.projected || 0) - (a.projected || 0))
            .map((r,i) => ({ ...r, rank: i+1 }));
        }, [lbData, stats.totalPoints, account, backendStats]);

        const hasKnockout = ["r32","r16","qf","sf"].some(k => merged.knockout[k].length > 0)
          || merged.knockout.third || merged.knockout.f;

        return (
          <div className="min-h-screen bg-[radial-gradient(ellipse_at_top,#0a1a2e_0%,#020617_55%,#000_100%)] text-slate-100">
            <div className="max-w-[1400px] mx-auto px-4 sm:px-6 pb-24">

              {/* ---------- Header ---------- */}
              <header className="pt-8 pb-4 flex flex-col md:flex-row md:items-end gap-4 justify-between">
                <div className="flex items-center gap-3">
                  <div className="h-12 w-12 rounded-xl bg-gradient-to-br from-emerald-400 to-cyan-500 flex items-center justify-center shadow-[0_0_30px_rgba(16,185,129,0.35)]">
                    <Trophy className="h-6 w-6 text-slate-900" />
                  </div>
                  <div>
                    <h1 className="text-2xl sm:text-3xl font-extrabold tracking-tight">
                      Global Cup{" "}
                      <span className="bg-gradient-to-r from-emerald-300 via-cyan-300 to-sky-300 bg-clip-text text-transparent">Predictor</span>
                      <span className="ml-2 align-middle text-[11px] uppercase tracking-widest text-emerald-300 font-bold">Live</span>
                    </h1>
                    <p className="text-sm text-slate-400">Powered by API-Football. Paste your key, load the current draw, predict every match.</p>
                  </div>
                </div>
                <div className="flex flex-wrap items-center gap-2">
                  {/* Account pill */}
                  {account ? (
                    <div className="inline-flex items-center gap-2 rounded-lg px-3 py-2 bg-slate-900 border border-slate-800 text-sm">
                      <span className="text-base leading-none" title={countryName(account.country)}>{flagFor(account.country)}</span>
                      <span className="font-semibold text-slate-100 truncate max-w-[9rem]">{account.displayName}</span>
                      <button
                        onClick={signOut}
                        title="Sign out"
                        className="text-[11px] text-slate-500 hover:text-rose-300 uppercase"
                      >
                        out
                      </button>
                    </div>
                  ) : (
                    <button
                      onClick={() => {
                        // Ask parent samsports app to open its login modal
                        if (window.parent !== window) {
                          window.parent.postMessage({ type: 'wcp:requestLogin' }, '*');
                        } else {
                          setAuthModal("signup"); // fallback if opened standalone
                        }
                      }}
                      className="inline-flex items-center gap-2 rounded-lg px-3.5 py-2 bg-slate-900 border border-emerald-500/40 text-emerald-300 hover:bg-emerald-500/10 text-sm font-semibold"
                    >
                      <Star className="h-4 w-4" /> Sign in / Join
                    </button>
                  )}

                  {/* SamPoints wallet — only makes sense when signed in */}
                  {account && (
                    <SamPointsWallet
                      account={account}
                      stats={stats}
                      onSync={syncToFantasy}
                      syncToast={syncToast}
                    />
                  )}
                  {/* Save / Confirm */}
                  <button
                    onClick={savePicks}
                    disabled={unsavedCount === 0}
                    title={unsavedCount === 0 ? "All predictions saved" : `${unsavedCount} unsaved pick${unsavedCount===1?"":"s"} — click to save (Ctrl/Cmd+S)`}
                    className={
                      "relative inline-flex items-center gap-2 rounded-lg px-3.5 py-2 font-semibold text-sm transition " +
                      (unsavedCount > 0
                        ? "bg-gradient-to-br from-amber-400 to-orange-500 text-slate-900 hover:brightness-110 shadow-[0_0_20px_rgba(251,191,36,0.4)] animate-pulse"
                        : "bg-slate-800 border border-slate-700 text-slate-300 cursor-default")
                    }
                  >
                    {saveToast
                      ? <><Check className="h-4 w-4 text-emerald-300" /> Saved!</>
                      : unsavedCount > 0
                        ? <><Save className="h-4 w-4" /> Save ({unsavedCount})</>
                        : <><Check className="h-4 w-4 text-emerald-300" /> Saved</>}
                  </button>

                  <button onClick={() => setShareOpen(true)} className="inline-flex items-center gap-2 rounded-lg px-3.5 py-2 bg-gradient-to-br from-emerald-400 to-cyan-500 text-slate-900 font-semibold text-sm hover:brightness-110 shadow-[0_0_20px_rgba(16,185,129,0.35)]">
                    <Share2 className="h-4 w-4" /> Share Card
                  </button>
                  <button onClick={copyLink} className="inline-flex items-center gap-2 rounded-lg px-3.5 py-2 bg-slate-800 border border-slate-700 text-slate-100 text-sm hover:bg-slate-700">
                    {linkCopied ? <Check className="h-4 w-4 text-emerald-400" /> : <Link2 className="h-4 w-4" />}
                    {linkCopied ? "Copied!" : "Copy Link"}
                  </button>
                  <button onClick={resetPicks} className="inline-flex items-center gap-2 rounded-lg px-3.5 py-2 bg-slate-900 border border-slate-800 text-slate-400 hover:text-rose-300 text-sm">
                    <RotateCcw className="h-4 w-4" /> Reset
                  </button>
                </div>
              </header>

              {/* ---------- Data-source panel (hidden from end users, dev-only) ---------- */}
              {/* DataSourcePanel removed from production UI — API key is hardcoded and auto-loads */}

              {/* ---------- Stats ---------- */}
              <section className="grid grid-cols-2 md:grid-cols-5 gap-3 my-5">
                <StatCard icon={<Target className="h-4 w-4" />} label="Picks" value={`${stats.madePicks}/${stats.totalMatches || "-"}`} color="cyan" />
                <StatCard
                  icon={<Sparkles className="h-4 w-4" />}
                  label="SamPoints"
                  value={fmtPts(stats.settledPoints)}
                  sub={stats.totalPoints > stats.settledPoints ? `/${fmtPts(stats.totalPoints)} projected` : null}
                  color="emerald"
                />
                <StatCard icon={<Flame className="h-4 w-4" />} label="Upsets" value={stats.upsets} color="orange" />
                <StatCard icon={<Crown className="h-4 w-4" />} label="Champion" value={champion ? champion.code : "TBD"} color="amber" />
                <StatCard icon={<Medal className="h-4 w-4" />} label="Runner-up" value={runnerUp ? runnerUp.code : "TBD"} color="slate" />
              </section>

              {/* ---------- SP Rewards Legend ---------- */}
              <div className="flex flex-wrap items-center gap-2 mb-4 px-4 py-3 rounded-xl bg-gradient-to-r from-amber-500/10 via-slate-900/80 to-emerald-500/10 border border-amber-500/30 shadow-[0_0_15px_rgba(251,191,36,0.1)]">
                <span className="text-xs uppercase tracking-wider font-bold text-amber-400 flex items-center gap-1.5"><Flame className="h-4 w-4" /> SP Rewards:</span>
                {[
                  { label: "Group Match", pts: POINTS.group },
                  { label: "Exact Score", pts: 50000, accent: true },
                  { label: "Group Pos.", pts: POINTS.groupPosition },
                  { label: "R32", pts: POINTS.r32 },
                  { label: "R16", pts: POINTS.r16 },
                  { label: "QF", pts: POINTS.qf },
                  { label: "SF", pts: POINTS.sf },
                  { label: "3rd Place", pts: POINTS.third },
                  { label: "Winner", pts: POINTS.final, gold: true },
                ].map(r => (
                  <span key={r.label} className={`inline-flex items-center gap-1 text-[11px] px-2 py-0.5 rounded-full border ${r.gold ? "border-amber-400/40 bg-amber-400/10 text-amber-300" : r.accent ? "border-emerald-400/30 bg-emerald-400/5 text-emerald-300" : "border-slate-700 bg-slate-800/60 text-slate-300"}`}>
                    {r.label} <b className={r.gold ? "text-amber-300" : "text-white"}>{r.pts >= 1000000 ? `${(r.pts/1000000).toFixed(0)}M` : `${(r.pts/1000).toFixed(0)}K`}</b>
                  </span>
                ))}
                <span className="text-[10px] text-slate-500 ml-auto">2x for upset picks</span>
              </div>

              {/* ---------- Tabs ---------- */}
              <div className="flex items-center justify-between mb-5 flex-wrap gap-3">
                <nav className="inline-flex rounded-xl bg-slate-900/80 border border-slate-800 p-1">
                  <TabButton active={tab==="groups"} onClick={()=>setTab("groups")}>
                    <Users className="h-4 w-4" /> Group Stage
                    <span className="ml-1 text-[11px] text-slate-400">{stats.groupPicks}/{stats.totalGroup}</span>
                  </TabButton>
                  <TabButton active={tab==="knockout"} onClick={()=>setTab("knockout")}>
                    <Swords className="h-4 w-4" /> Knockout
                    <span className="ml-1 text-[11px] text-slate-400">{stats.koPicks}/{stats.totalKo}</span>
                  </TabButton>
                </nav>
                {source === "live" && (
                  <div className="inline-flex items-center gap-2 text-[11px] uppercase tracking-widest text-emerald-300">
                    <Satellite className="h-3.5 w-3.5" /> Live data · {fixturesCount || "?"} fixtures
                  </div>
                )}
              </div>

              {/* ---------- Main ---------- */}
              {tab === "groups" ? (
                <GroupStage data={merged} onPick={setGroupResult} userPicks={userPicks} onBumpTie={bumpTieTeamUp} onScoreChange={handleScoreChange} scores={scores} />
              ) : (
                <KnockoutStage data={merged} onPick={setKoWinner} onScoreChange={handleScoreChange} scores={scores} />
              )}

              {/* ---------- Leaderboard ---------- */}
              <Leaderboard
                rows={leaderboard}
                account={account}
                authToken={authToken}
                onSignIn={() => {
                  if (window.parent !== window) {
                    window.parent.postMessage({ type: 'wcp:requestLogin' }, '*');
                  } else {
                    setAuthModal("signup");
                  }
                }}
              />

              <footer className="mt-10 text-center text-xs text-slate-500 space-y-1">
                <div>Data via <span className="text-slate-300">api-football.com</span> · league {league} · season {season} · your picks stored locally</div>
                <div>Scoring: base SamPoints per round &times; 2 for upset picks (powered by FIFA World Rankings)</div>
              </footer>
            </div>

            {shareOpen && (
              <ShareModal
                onClose={()=>setShareOpen(false)}
                champion={champion} runnerUp={runnerUp} stats={stats}
                shareLink={shareLink} summary={shareSummary}
                copySummary={copySummary} summaryCopied={summaryCopied}
                copyLink={copyLink} linkCopied={linkCopied}
                topScorer={leaderboard[0]}
                yourRank={leaderboard.find(r=>r.isUser)?.rank || 0}
              />
            )}

            {authModal && (
              <AuthModal
                mode={authModal}
                onClose={()=>setAuthModal(null)}
                onAuth={(profile) => {
                  saveAccount(profile);
                  setAuthModal(null);
                }}
              />
            )}

            {/* Custom confirm dialog (replaces native window.confirm) */}
            {confirmModal && (
              <div className="fixed inset-0 z-[9999] flex items-center justify-center" onClick={() => setConfirmModal(null)}>
                <div className="absolute inset-0 bg-black/70 backdrop-blur-sm" />
                <div
                  className="relative w-full max-w-sm mx-4 rounded-2xl overflow-hidden border border-slate-700/60 shadow-2xl"
                  onClick={e => e.stopPropagation()}
                >
                  <div className="bg-gradient-to-b from-slate-800 to-slate-900 p-6">
                    <div className="flex items-center gap-3 mb-3">
                      <div className="h-10 w-10 rounded-full bg-rose-500/15 flex items-center justify-center">
                        <AlertTriangle className="h-5 w-5 text-rose-400" />
                      </div>
                      <h3 className="text-lg font-bold text-white">{confirmModal.title}</h3>
                    </div>
                    <p className="text-sm text-slate-300 leading-relaxed mb-6">{confirmModal.message}</p>
                    <div className="flex gap-3">
                      <button
                        onClick={() => setConfirmModal(null)}
                        className="flex-1 px-4 py-2.5 rounded-xl bg-slate-700/50 border border-slate-600/50 text-slate-300 text-sm font-semibold hover:bg-slate-700"
                      >
                        Cancel
                      </button>
                      <button
                        onClick={confirmModal.onConfirm}
                        className="flex-1 px-4 py-2.5 rounded-xl bg-gradient-to-r from-rose-600 to-rose-500 text-white text-sm font-bold hover:brightness-110 shadow-lg shadow-rose-500/20"
                      >
                        {confirmModal.confirmLabel || "Confirm"}
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      /* --------------------------------------------
         Data-source panel
      ---------------------------------------------- */
      function DataSourcePanel({ open, setOpen, apiKey, setApiKey, season, setSeason, league, setLeague, onLoad, loading, source, error, fixturesCount, clearCache, matchCount }) {
        return (
          <div className={`rounded-2xl border ${source==="live" ? "border-emerald-500/30 bg-emerald-400/5" : "border-slate-800 bg-slate-900/70"} overflow-hidden`}>
            <button
              onClick={()=>setOpen(!open)}
              className="w-full flex items-center justify-between px-4 py-3 text-left"
            >
              <div className="flex items-center gap-3">
                <div className="h-8 w-8 rounded-lg bg-slate-800 flex items-center justify-center">
                  {source==="live" ? <Satellite className="h-4 w-4 text-emerald-300" />
                    : source==="cache" ? <Database className="h-4 w-4 text-cyan-300" />
                    : <AlertTriangle className="h-4 w-4 text-amber-300" />}
                </div>
                <div>
                  <div className="text-sm font-semibold">
                    {source==="live" ? "Connected to API-Football" :
                     source==="cache" ? "Using cached tournament data" :
                     "Using mock data — connect API to load the real draw"}
                  </div>
                  <div className="text-xs text-slate-400">
                    League {league} · Season {season}
                    {fixturesCount != null && <> · {fixturesCount} fixtures</>}
                    {matchCount > 0 && <> · {matchCount} matches loaded</>}
                  </div>
                </div>
              </div>
              <ChevronRight className={`h-4 w-4 text-slate-400 transition ${open ? "rotate-90" : ""}`} />
            </button>
            {open && (
              <div className="px-4 pb-4 pt-1 border-t border-slate-800">
                <div className="grid grid-cols-1 md:grid-cols-[1fr_120px_120px_auto] gap-2 items-end">
                  <div>
                    <label className="text-[11px] uppercase text-slate-500 flex items-center gap-1"><KeyRound className="h-3 w-3" /> API-Football key</label>
                    <input
                      type="password"
                      value={apiKey}
                      onChange={e=>setApiKey(e.target.value)}
                      placeholder="Paste your x-apisports-key"
                      className="mt-1 w-full rounded-md bg-slate-950 border border-slate-800 px-3 py-2 text-sm font-mono focus:outline-none focus:border-emerald-400"
                      autoComplete="off"
                      spellCheck={false}
                    />
                  </div>
                  <div>
                    <label className="text-[11px] uppercase text-slate-500">Season</label>
                    <input
                      type="number"
                      value={season}
                      onChange={e=>setSeason(e.target.value)}
                      className="mt-1 w-full rounded-md bg-slate-950 border border-slate-800 px-3 py-2 text-sm font-mono focus:outline-none focus:border-emerald-400"
                    />
                  </div>
                  <div>
                    <label className="text-[11px] uppercase text-slate-500">League ID</label>
                    <input
                      type="number"
                      value={league}
                      onChange={e=>setLeague(e.target.value)}
                      className="mt-1 w-full rounded-md bg-slate-950 border border-slate-800 px-3 py-2 text-sm font-mono focus:outline-none focus:border-emerald-400"
                    />
                  </div>
                  <div className="flex gap-2">
                    <button
                      onClick={onLoad}
                      disabled={loading || !apiKey}
                      className="inline-flex items-center gap-1.5 rounded-md px-3 py-2 bg-gradient-to-br from-emerald-400 to-cyan-500 text-slate-900 font-semibold text-sm disabled:opacity-40 disabled:cursor-not-allowed hover:brightness-110"
                    >
                      {loading ? <Loader2 className="h-4 w-4 animate-spin" /> : <RefreshCw className="h-4 w-4" />}
                      {loading ? "Loading…" : "Load live data"}
                    </button>
                    <button
                      onClick={clearCache}
                      className="inline-flex items-center gap-1.5 rounded-md px-3 py-2 bg-slate-800 border border-slate-700 text-slate-300 text-sm hover:bg-slate-700"
                      title="Clear cached data"
                    >
                      <X className="h-4 w-4" />
                    </button>
                  </div>
                </div>
                {error && (
                  <div className="mt-2 rounded-md bg-rose-950/40 border border-rose-900/50 px-3 py-2 text-xs text-rose-200 flex items-start gap-2">
                    <AlertTriangle className="h-4 w-4 shrink-0 mt-0.5" />
                    <span>{error}</span>
                  </div>
                )}
                <div className="mt-2 text-[11px] text-slate-500 flex items-start gap-2">
                  <Lock className="h-3.5 w-3.5 shrink-0 mt-0.5" />
                  <span>
                    Key is stored only in your browser's localStorage. Direct browser calls expose the key to anyone viewing the page — do NOT deploy this file publicly. For production, proxy requests through your backend.
                    {" "}If the call is blocked by CORS when opening the file directly, run <code className="text-cyan-200">python3 -m http.server 8000</code> and open <code className="text-cyan-200">localhost:8000/WorldCupPredictor-Live.html</code> instead.
                  </span>
                </div>
              </div>
            )}
          </div>
        );
      }

      /* --------------------------------------------
         Reusable presentational components
      ---------------------------------------------- */
      function StatCard({ icon, label, value, sub, color="cyan" }) {
        const palette = {
          cyan: "from-cyan-400/20 to-cyan-400/5 text-cyan-300 border-cyan-500/20",
          emerald: "from-emerald-400/20 to-emerald-400/5 text-emerald-300 border-emerald-500/20",
          orange: "from-orange-400/20 to-orange-400/5 text-orange-300 border-orange-500/20",
          amber: "from-amber-400/20 to-amber-400/5 text-amber-300 border-amber-500/20",
          slate: "from-slate-400/15 to-slate-400/5 text-slate-200 border-slate-600/30",
        }[color];
        return (
          <div className={`rounded-xl bg-gradient-to-br ${palette} border p-3 backdrop-blur-sm`}>
            <div className="flex items-center gap-1.5 text-[11px] uppercase tracking-wider opacity-80">{icon}{label}</div>
            <div className="mt-1 text-lg sm:text-xl font-bold text-white truncate">
              {value}
              {sub && <span className="text-[11px] font-normal text-slate-400 ml-1">{sub}</span>}
            </div>
          </div>
        );
      }

      function TabButton({ active, onClick, children }) {
        return (
          <button onClick={onClick} className={`inline-flex items-center gap-1.5 px-3.5 py-1.5 text-sm rounded-lg transition ${active ? "bg-gradient-to-br from-emerald-400 to-cyan-500 text-slate-900 font-semibold shadow-[0_0_20px_rgba(16,185,129,0.25)]" : "text-slate-300 hover:bg-slate-800/60"}`}>
            {children}
          </button>
        );
      }

      function TeamBadge({ team, size=16 }) {
        if (!team) return null;
        if (team.logo) return <img src={team.logo} alt="" style={{width:size,height:size}} className="inline-block rounded-sm object-contain bg-white/5" />;
        return <span className="text-base">{team.flag || "🏳️"}</span>;
      }

      /* ---------- Group stage ---------- */
      function GroupStage({ data, onPick, userPicks, onBumpTie, onScoreChange, scores }) {
        if (!data.groups.length) {
          return (
            <div className="rounded-2xl border border-slate-800 bg-slate-900/50 p-8 text-center">
              <Shield className="h-10 w-10 mx-auto mb-3 text-slate-500" />
              <div className="text-lg font-semibold text-slate-200">No group data loaded</div>
              <div className="text-sm text-slate-400 mt-1">Open the data-source panel above and click "Load live data".</div>
            </div>
          );
        }
        return (
          <section className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3">
            {data.groups.map(g => (
              <GroupCard
                key={g.letter}
                group={g}
                onPick={onPick}
                onScoreChange={onScoreChange}
                scores={scores}
                tieOrder={userPicks?.[`tie:${g.letter}`]}
                onBumpTie={(teamId) => onBumpTie(g.letter, teamId)}
              />
            ))}
          </section>
        );
      }

      function GroupCard({ group, onPick, onScoreChange, scores, tieOrder, onBumpTie }) {
        const { standings, allPlayed, tieClusters, needsResolution } = computeStandings(group, tieOrder);
        const tiedIdxSet = new Set(tieClusters.flat());
        return (
          <div className={`rounded-2xl bg-slate-900/80 overflow-hidden shadow-lg border ${needsResolution ? "border-amber-500/50" : "border-slate-800"}`}>
            <div className="flex items-center justify-between px-3 py-1.5 border-b border-slate-800">
              <div className="flex items-center gap-1.5">
                <div className="h-6 w-6 rounded-md bg-gradient-to-br from-cyan-500 to-emerald-500 text-slate-900 font-black flex items-center justify-center text-xs">{group.letter}</div>
                <div className="text-xs font-semibold">Group {group.letter}</div>
              </div>
              <div className="text-[11px] text-slate-400 uppercase">
                {allPlayed ? (
                  <span className="text-emerald-300 flex items-center gap-1"><CircleCheck className="h-3 w-3" /> Complete</span>
                ) : (
                  <span className="flex items-center gap-1"><CircleDot className="h-3 w-3" />{group.matches.filter(m=>m.result || m.actual).length}/{group.matches.length}</span>
                )}
              </div>
            </div>
            <div className="px-2 pt-2 pb-1.5 space-y-1">
              {group.matches.map(m => <GroupMatchRow key={m.id} match={m} onPick={r => onPick(m.id, r)} onScoreChange={onScoreChange} scoreHome={scores?.[`sh:${m.id}`]} scoreAway={scores?.[`sa:${m.id}`]} />)}
            </div>
            <div className="px-2 pb-2">
              <div className="rounded-md bg-slate-950/60 border border-slate-800 overflow-hidden">
                <div className="grid grid-cols-[1.2rem_1fr_1.2rem_1.2rem_1.2rem_1.5rem_1.2rem] text-[9px] uppercase text-slate-500 px-2 py-1 border-b border-slate-800">
                  <div>#</div><div>Team</div><div className="text-center">W</div><div className="text-center">D</div><div className="text-center">L</div><div className="text-center">Pts</div><div></div>
                </div>
                {standings.map((s, idx) => {
                  const adv = idx < 2;
                  const inTie = tiedIdxSet.has(idx);
                  const cluster = tieClusters.find(c => c.includes(idx));
                  const canMoveUp = cluster && idx > cluster[0];
                  return (
                    <div key={s.team.id} className={`grid grid-cols-[1.2rem_1fr_1.2rem_1.2rem_1.2rem_1.5rem_1.2rem] items-center px-2 py-1 text-[11px] ${idx<group.teams.length-1 ? "border-b border-slate-800/70" : ""} ${inTie ? "bg-amber-500/5" : ""}`}>
                      <div className={`flex items-center justify-center h-4 w-4 rounded text-[10px] font-bold ${adv ? "bg-emerald-400/20 text-emerald-300" : "text-slate-500"}`}>{idx+1}</div>
                      <div className="flex items-center gap-2 min-w-0">
                        <TeamBadge team={s.team} size={14} />
                        <span className={`truncate ${adv ? "text-white font-medium" : "text-slate-400"}`}>{s.team.name}</span>
                      </div>
                      <div className="text-center text-slate-300">{s.won}</div>
                      <div className="text-center text-slate-300">{s.drew}</div>
                      <div className="text-center text-slate-300">{s.lost}</div>
                      <div className={`text-center font-semibold ${adv ? "text-emerald-300" : "text-slate-400"}`}>{s.points}</div>
                      <div className="text-center">
                        {canMoveUp && (
                          <button
                            onClick={()=>onBumpTie(s.team.id)}
                            title="Move up in the tiebreaker — these teams are level on points"
                            className="inline-flex h-5 w-5 items-center justify-center rounded-md bg-amber-500/20 hover:bg-amber-500/30 text-amber-200 border border-amber-500/40 text-[10px] font-bold leading-none"
                          >
                            ↑
                          </button>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
              {needsResolution && (
                <div className="mt-2 rounded-md bg-amber-500/10 border border-amber-500/30 px-3 py-2 text-[11px] text-amber-200 leading-snug flex items-start gap-2">
                  <AlertTriangle className="h-3.5 w-3.5 flex-none mt-0.5" />
                  <span>
                    <b>Tie on points.</b> Without a goal-prediction input we can't auto-apply FIFA's tiebreakers (GD → GF → H2H). Click <b>↑</b> next to a tied team to set who you think finishes higher.
                  </span>
                </div>
              )}
            </div>
          </div>
        );
      }

      function GroupMatchRow({ match, onPick, onScoreChange, scoreHome, scoreAway }) {
        const locked = !!match.actual;
        const pA = match.actual ? match.actual === "A" : match.result === "A";
        const pB = match.actual ? match.actual === "B" : match.result === "B";
        const pD = match.actual ? match.actual === "D" : match.result === "D";
        const hasPick = pA || pB || pD;
        const hasScore = scoreHome != null && scoreAway != null && scoreHome !== "" && scoreAway !== "";

        // When user types a score, auto-set the result pick
        const handleScore = (side, value) => {
          onScoreChange(match.id, side, value);
          const h = side === "home" ? (value === "" ? null : Math.max(0, parseInt(value) || 0)) : scoreHome;
          const a = side === "away" ? (value === "" ? null : Math.max(0, parseInt(value) || 0)) : scoreAway;
          if (h != null && a != null) {
            if (h > a) onPick("A");
            else if (a > h) onPick("B");
            else onPick("D");
          }
        };

        return (
          <div className={`rounded-md border p-1 ${locked ? "bg-slate-950/80 border-cyan-900/40" : "bg-slate-950/60 border-slate-800"}`}>
            <div className="flex items-center gap-0.5">
              {/* Home team button */}
              <button onClick={()=>!locked && onPick("A")} disabled={locked}
                className={`flex items-center justify-center gap-1 px-1.5 py-1 rounded-md border-2 text-xs transition-all relative flex-1 min-w-0 ${pA ? "bg-gradient-to-r from-emerald-600/40 to-emerald-500/30 border-emerald-400 text-white shadow-[0_0_12px_rgba(16,185,129,0.35),inset_0_1px_0_rgba(255,255,255,0.1)]" : "bg-slate-900/60 border-slate-800 text-slate-400 hover:border-slate-600 hover:text-slate-200"} ${locked ? "cursor-default opacity-90" : ""}`}>
                <TeamBadge team={match.teamA} size={13} />
                <span className={`truncate ${pA ? "font-extrabold text-white" : "font-medium"}`}>{match.teamA.code}</span>
                {pA && <span className="absolute top-0 right-0.5 text-[7px] text-emerald-300">✓</span>}
              </button>
              {/* Score inputs inline */}
              {!locked && onScoreChange ? (
                <div className="flex items-center gap-0.5 flex-none">
                  <input type="number" min="0" max="20" placeholder="-"
                    value={scoreHome != null ? scoreHome : ""}
                    onChange={e => handleScore("home", e.target.value)}
                    className="w-7 h-6 text-center text-xs font-mono rounded border border-amber-500/30 bg-slate-900 text-white focus:border-amber-400 focus:outline-none appearance-none [&::-webkit-inner-spin-button]:appearance-none [&::-webkit-outer-spin-button]:appearance-none" />
                  <span className="text-[10px] text-slate-600 font-bold">-</span>
                  <input type="number" min="0" max="20" placeholder="-"
                    value={scoreAway != null ? scoreAway : ""}
                    onChange={e => handleScore("away", e.target.value)}
                    className="w-7 h-6 text-center text-xs font-mono rounded border border-amber-500/30 bg-slate-900 text-white focus:border-amber-400 focus:outline-none appearance-none [&::-webkit-inner-spin-button]:appearance-none [&::-webkit-outer-spin-button]:appearance-none" />
                </div>
              ) : (
                <button onClick={()=>!locked && onPick("D")} disabled={locked}
                  className={`px-1.5 py-0.5 rounded-md text-[9px] font-bold tracking-wider border-2 flex-none ${pD ? "bg-gradient-to-r from-amber-500/35 to-amber-400/25 border-amber-400 text-white shadow-[0_0_12px_rgba(251,191,36,0.3),inset_0_1px_0_rgba(255,255,255,0.1)]" : "bg-slate-900/60 border-slate-800 text-slate-500 hover:text-amber-300 hover:border-amber-500/40"} ${locked ? "cursor-default opacity-90" : ""}`}>
                  {locked && match.score.home != null ? <span className="font-mono text-cyan-200">{match.score.home}-{match.score.away}</span> : "DRAW"}
                </button>
              )}
              {/* Away team button */}
              <button onClick={()=>!locked && onPick("B")} disabled={locked}
                className={`flex items-center justify-center gap-1 px-1.5 py-1 rounded-md border-2 text-xs transition-all relative flex-1 min-w-0 ${pB ? "bg-gradient-to-l from-emerald-600/40 to-emerald-500/30 border-emerald-400 text-white shadow-[0_0_12px_rgba(16,185,129,0.35),inset_0_1px_0_rgba(255,255,255,0.1)]" : "bg-slate-900/60 border-slate-800 text-slate-400 hover:border-slate-600 hover:text-slate-200"} ${locked ? "cursor-default opacity-90" : ""}`}>
                <span className={`truncate ${pB ? "font-extrabold text-white" : "font-medium"}`}>{match.teamB.code}</span>
                <TeamBadge team={match.teamB} size={13} />
                {pB && <span className="absolute top-0 left-0.5 text-[7px] text-emerald-300">✓</span>}
              </button>
            </div>
          </div>
        );
      }

      /* ---------- Knockout ---------- */
      function KnockoutStage({ data, onPick, onScoreChange, scores }) {
        const stages = KO_ORDER.filter(k => {
          if (k === "f") return !!data.knockout.f;
          return data.knockout[k].length > 0;
        });
        if (!stages.length && !data.knockout.third) {
          return (
            <div className="rounded-2xl border border-slate-800 bg-slate-900/50 p-8 text-center">
              <Shield className="h-10 w-10 mx-auto mb-3 text-slate-500" />
              <div className="text-lg font-semibold text-slate-200">No knockout fixtures yet</div>
              <div className="text-sm text-slate-400 mt-1">The bracket will appear once API-Football exposes the knockout draw.</div>
            </div>
          );
        }
        return (
          <>
            <div className="overflow-x-auto pb-2">
              <div className="flex gap-3 min-w-max">
                {stages.map(key => (
                  <BracketColumn
                    key={key}
                    title={KO_META[key].name}
                    points={KO_META[key].basePoints}
                    matches={key === "f" ? [data.knockout.f] : data.knockout[key]}
                    onPick={onPick}
                    onScoreChange={onScoreChange}
                    scores={scores}
                    final={key==="f"}
                  />
                ))}
              </div>
            </div>
            {data.knockout.third && (
              <div className="mt-5">
                <div className="text-[11px] uppercase tracking-wider text-slate-400 mb-1 flex items-center gap-1.5">
                  <Medal className="h-3.5 w-3.5 text-amber-300" />
                  Third-place Playoff <span className="text-amber-300 ml-auto">+{POINTS.third}pt</span>
                </div>
                <MatchCard match={data.knockout.third} onPick={team => team && onPick(data.knockout.third.id, team.id)} onScoreChange={onScoreChange} scores={scores} />
              </div>
            )}
          </>
        );
      }

      function BracketColumn({ title, points, matches, onPick, final=false, onScoreChange, scores }) {
        return (
          <div className="flex-1 min-w-[180px] flex flex-col">
            <div className="text-[11px] uppercase tracking-wider text-slate-400 mb-2 flex items-center justify-between">
              <span>{title}</span><span className="text-emerald-300 font-semibold">+{points}pt</span>
            </div>
            <div className={`flex-1 flex flex-col justify-around gap-2 ${final ? "justify-center" : ""}`}>
              {matches.map(m => (
                <MatchCard key={m?.id || Math.random()} match={m} big={final}
                  onPick={team => team && m && onPick(m.id, team.id)}
                  onScoreChange={onScoreChange} scores={scores} />
              ))}
            </div>
          </div>
        );
      }

      function MatchCard({ match, onPick, big=false, onScoreChange, scores }) {
        if (!match) return null;
        const locked = !!match.actual;
        const fId = match.id;
        const sh = scores?.[`sh:${fId}`] ?? "";
        const sa = scores?.[`sa:${fId}`] ?? "";
        const handleKoScore = (side, val) => {
          if (!onScoreChange || locked) return;
          const v = val === "" ? "" : Math.max(0, Math.min(99, parseInt(val) || 0));
          onScoreChange(fId, side, v);
          // Auto-pick winner when both scores entered
          const nh = side === "home" ? v : sh;
          const na = side === "away" ? v : sa;
          if (nh !== "" && na !== "" && match.teamA && match.teamB) {
            const h = Number(nh), a = Number(na);
            if (h > a) onPick(match.teamA);
            else if (a > h) onPick(match.teamB);
            // If draw in knockout, user must still pick a winner manually
          }
        };
        return (
          <div className={`rounded-lg border overflow-hidden shadow-md transition ${locked ? "border-cyan-900/40 bg-slate-900/80" : "border-slate-800 bg-slate-900/70"} ${big ? "ring-1 ring-amber-400/30 shadow-[0_0_30px_rgba(251,191,36,0.15)]" : ""}`}>
            {big && (
              <div className="px-2 py-1 text-[10px] uppercase tracking-widest text-amber-300 bg-amber-400/10 flex items-center gap-1 justify-center">
                <Crown className="h-3 w-3" /> Final{match.matchNum ? ` · M${match.matchNum}` : ""}
              </div>
            )}
            {!big && match.matchNum && (
              <div className="px-2 py-0.5 text-[9px] uppercase tracking-wider text-slate-500 bg-slate-950/60 border-b border-slate-800">
                FIFA M{match.matchNum}
              </div>
            )}
            <div className="flex items-center">
              <div className="flex-1">
                <KoRow team={match.teamA}
                  winner={(match.actual ? match.actual==="A" : match.winner && match.teamA && match.winner.id === match.teamA.id)}
                  score={match.score.home}
                  locked={locked}
                  onClick={()=>!locked && match.teamA && onPick(match.teamA)}
                  big={big} />
              </div>
              {!locked && onScoreChange && match.teamA && match.teamB ? (
                <div className="flex flex-col items-center gap-0.5 px-1 flex-none">
                  <input type="number" min="0" max="99" value={sh}
