<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dynasty 32 — Week 20 Divisional Bracket</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet" />
<style>
  body { background: #0a0a1a; margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(110,105,128,0.3); backdrop-filter: blur(8px); }
  .glow-indigo { box-shadow: 0 0 20px rgba(99,102,241,0.15); }
  .badge-gold { border: 2px solid #d4a017; box-shadow: 0 0 8px rgba(212,160,23,0.3); }
  .badge-blue { border: 2px solid #3b82f6; box-shadow: 0 0 8px rgba(59,130,246,0.3); }
  @keyframes pulse-slow { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .pulse-slow { animation: pulse-slow 2s ease-in-out infinite; }
  .connector { position: relative; }
  .connector::before {
    content: '';
    position: absolute;
    left: -24px;
    top: 50%;
    width: 24px;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(99,102,241,0.4));
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

/* ── Mock Data ─────────────────────────────────────────────── */
const CONF1 = {
  label: 'Conference 1',
  color: 'indigo',
  seed1: { id:'c1s1', name:'Iron Wolves', abbr:'IW', seed:1, wins:13, losses:4 },
  wildCard: [
    { winner:{id:'c1s3',name:'Shadow Raptors',abbr:'SR',seed:3,wins:11,losses:6},
      loser:{id:'c1s6',name:'Blitz Cobras',abbr:'BC',seed:6,wins:9,losses:8}, score:'142.3–118.7' },
    { winner:{id:'c1s4',name:'Crimson Titans',abbr:'CT',seed:4,wins:10,losses:7},
      loser:{id:'c1s5',name:'Neon Stallions',abbr:'NS',seed:5,wins:10,losses:7}, score:'155.1–149.8' },
    { winner:{id:'c1s7',name:'Venom Knights',abbr:'VK',seed:7,wins:9,losses:8},
      loser:{id:'c1s2',name:'Apex Predators',abbr:'AP',seed:2,wins:12,losses:5}, score:'167.2–160.4' },
  ],
};
const CONF2 = {
  label: 'Conference 2',
  color: 'purple',
  seed1: { id:'c2s1', name:'Storm Falcons', abbr:'SF', seed:1, wins:14, losses:3 },
  wildCard: [
    { winner:{id:'c2s2',name:'Phantom Bears',abbr:'PB',seed:2,wins:12,losses:5},
      loser:{id:'c2s7',name:'Riot Panthers',abbr:'RP',seed:7,wins:8,losses:9}, score:'138.9–112.1' },
    { winner:{id:'c2s3',name:'Blaze Dragons',abbr:'BD',seed:3,wins:11,losses:6},
      loser:{id:'c2s6',name:'Steel Sharks',abbr:'SS',seed:6,wins:9,losses:8}, score:'144.6–139.2' },
    { winner:{id:'c2s5',name:'Omega Hawks',abbr:'OH',seed:5,wins:10,losses:7},
      loser:{id:'c2s4',name:'Frost Giants',abbr:'FG',seed:4,wins:10,losses:7}, score:'151.0–147.3' },
  ],
};

function reseed(seed1, wcResults) {
  const survivors = wcResults.map(r => r.winner);
  const sorted = [...survivors].sort((a,b) => a.seed - b.seed);
  const lowest = sorted[sorted.length - 1];
  const rest = sorted.filter(s => s.id !== lowest.id);
  return {
    g1: { home: seed1, away: lowest },
    g2: { home: rest[0], away: rest[1] },
  };
}

/* ── Team Pill ─────────────────────────────────────────────── */
function Team({ team, variant, badge }) {
  const dead = variant === 'eliminated';
  const bye = variant === 'bye';
  return (
    <div className={`flex items-center gap-3 px-4 py-3 rounded-lg transition-all duration-200 ${
      dead ? 'opacity-30 glass' :
      bye ? 'glass glow-indigo' :
      'glass hover:bg-white hover:bg-opacity-5'
    }`} style={{ minWidth: 0 }}>
      <div className={`w-9 h-9 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0 ${
        dead ? 'bg-gray-800 text-gray-600' :
        bye ? 'bg-yellow-900 bg-opacity-40 text-yellow-400' :
        'bg-indigo-900 bg-opacity-40 text-indigo-300'
      }`}>
        #{team.seed}
      </div>
      <div className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0 ${
        badge === 'gold' ? 'badge-gold bg-yellow-900 bg-opacity-20 text-yellow-300' :
        badge === 'blue' ? 'badge-blue bg-blue-900 bg-opacity-20 text-blue-300' :
        'bg-gray-800 text-gray-400 border border-gray-700'
      }`}>
        {team.abbr}
      </div>
      <div className="flex-1 min-w-0">
        <p className={`text-sm font-semibold truncate ${dead ? 'text-gray-600 line-through' : 'text-white'}`}>
          {team.name}
        </p>
        <p className="text-xs text-gray-500">{team.wins}-{team.losses}</p>
      </div>
      {bye && <span className="px-2 py-0.5 text-xs font-bold rounded bg-yellow-900 bg-opacity-30 text-yellow-400 border border-yellow-800 flex-shrink-0">BYE</span>}
      {dead && <span className="px-2 py-0.5 text-xs font-bold rounded bg-red-900 bg-opacity-30 text-red-500 border border-red-900 flex-shrink-0">OUT</span>}
    </div>
  );
}

/* ── Matchup Card ──────────────────────────────────────────── */
function Matchup({ home, away, label, round }) {
  return (
    <div className="glass rounded-xl p-4 glow-indigo" style={{minWidth:290}}>
      <div className="flex items-center justify-between mb-3">
        <span className="text-xs font-bold text-indigo-400 uppercase tracking-widest">{round}</span>
        {label && <span className="text-xs text-gray-600 italic">{label}</span>}
      </div>
      <div className="space-y-2">
        <Team team={home} badge="gold" />
        <div className="flex items-center gap-2 px-2">
          <div className="flex-1 h-px bg-gray-800"></div>
          <span className="text-xs font-bold text-gray-600">VS</span>
          <div className="flex-1 h-px bg-gray-800"></div>
        </div>
        <Team team={away} badge="blue" />
      </div>
    </div>
  );
}

/* ── WC Result Row ─────────────────────────────────────────── */
function WCRow({ r, i }) {
  return (
    <div className="glass rounded-lg px-3 py-2 flex items-center gap-3 text-xs">
      <span className="text-gray-600 font-mono w-6">WC{i+1}</span>
      <span className="text-green-500 font-bold">W</span>
      <span className="text-white font-medium flex-1">#{r.winner.seed} {r.winner.name}</span>
      <span className="text-gray-600 font-mono">{r.score}</span>
      <span className="text-red-500 font-bold">L</span>
      <span className="text-gray-600 line-through">#{r.loser.seed} {r.loser.name}</span>
    </div>
  );
}

/* ── Conference Column ─────────────────────────────────────── */
function ConfBracket({ data }) {
  const { g1, g2 } = useMemo(() => reseed(data.seed1, data.wildCard), [data]);
  return (
    <div className="flex-1" style={{minWidth:340}}>
      <div className="flex items-center gap-3 mb-5">
        <div className="w-1 h-8 rounded-full" style={{background:'linear-gradient(to bottom,#6366f1,#a855f7)'}}></div>
        <h2 className="text-lg font-bold text-white">{data.label}</h2>
      </div>

      {/* Re-seed explainer */}
      <div className="rounded-xl p-4 mb-5" style={{background:'rgba(99,102,241,0.08)',border:'1px solid rgba(99,102,241,0.15)'}}>
        <div className="flex items-start gap-3">
          <div className="w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0 text-yellow-400 text-sm" style={{background:'rgba(234,179,8,0.15)'}}>↻</div>
          <div>
            <h4 className="text-sm font-bold text-indigo-300 mb-1">Dynamic Re-seeding</h4>
            <p className="text-xs text-gray-400 leading-relaxed">
              <span className="text-yellow-400 font-semibold">#{g1.home.seed} {g1.home.name}</span> (BYE)
              faces <span className="text-orange-400 font-semibold">#{g1.away.seed} {g1.away.name}</span> — the lowest surviving seed.
            </p>
          </div>
        </div>
      </div>

      {/* WC Results */}
      <h3 className="text-xs font-bold text-gray-600 uppercase tracking-widest mb-2">Wild Card Results</h3>
      <div className="space-y-1 mb-5">
        {data.wildCard.map((r,i) => <WCRow key={i} r={r} i={i} />)}
      </div>

      {/* Divisional Matchups */}
      <h3 className="text-xs font-bold text-gray-600 uppercase tracking-widest mb-3">Divisional — Re-seeded</h3>
      <div className="space-y-4 mb-5">
        <Matchup home={g1.home} away={g1.away} round="Divisional" label={`#1 vs #${g1.away.seed}`} />
        <Matchup home={g2.home} away={g2.away} round="Divisional" label={`#${g2.home.seed} vs #${g2.away.seed}`} />
      </div>

      {/* Eliminated */}
      <h3 className="text-xs font-bold text-red-900 uppercase tracking-widest mb-2">Eliminated</h3>
      <div className="space-y-1">
        {data.wildCard.map((r,i) => <Team key={i} team={r.loser} variant="eliminated" />)}
      </div>
    </div>
  );
}

/* ── Roster Board Legend ────────────────────────────────────── */
function RosterLegend() {
  return (
    <div className="glass rounded-xl p-4 mt-8">
      <h3 className="text-xs font-bold text-gray-500 uppercase tracking-widest mb-3">Roster Board Legend</h3>
      <div className="flex flex-wrap gap-4">
        <div className="flex items-center gap-2">
          <div className="w-6 h-6 rounded-full badge-gold bg-yellow-900 bg-opacity-20"></div>
          <span className="text-xs text-gray-400">Dynasty Asset — original roster player</span>
        </div>
        <div className="flex items-center gap-2">
          <div className="w-6 h-6 rounded-full badge-blue bg-blue-900 bg-opacity-20"></div>
          <span className="text-xs text-gray-400">Supplemental Draft — added during redraft</span>
        </div>
        <div className="flex items-center gap-2">
          <div className="w-6 h-6 rounded-full bg-gray-800 border border-gray-700"></div>
          <span className="text-xs text-gray-500">Eliminated — NFL team out of playoffs</span>
        </div>
      </div>
    </div>
  );
}

/* ── App ───────────────────────────────────────────────────── */
function App() {
  const [view, setView] = useState('both');

  return (
    <div className="min-h-screen text-white p-4 md:p-6" style={{background:'#0a0a1a'}}>
      <div className="max-w-6xl mx-auto">
        {/* Header */}
        <div className="flex flex-wrap items-center justify-between gap-4 mb-6">
          <div>
            <h1 className="text-2xl md:text-3xl font-bold" style={{background:'linear-gradient(90deg,#818cf8,#c084fc)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>
              Week 20 — Divisional Round
            </h1>
            <p className="text-sm text-gray-500 mt-1">January 23-24, 2027 · Dynamic Re-seeding Active</p>
          </div>
          <div className="flex glass rounded-lg p-1">
            {['both','conf1','conf2'].map(v => (
              <button key={v} onClick={() => setView(v)}
                className={`px-4 py-1.5 rounded-md text-xs font-semibold transition-all ${
                  view===v ? 'bg-indigo-600 text-white' : 'text-gray-500 hover:text-gray-300'
                }`}>{v==='both'?'Both':v==='conf1'?'Conf 1':'Conf 2'}</button>
            ))}
          </div>
        </div>

        {/* Timeline */}
        <div className="flex items-center gap-1 mb-8 overflow-x-auto pb-2">
          {[
            {wk:19,label:'Wild Card',s:'done'},
            {wk:20,label:'Divisional',s:'active'},
            {wk:21,label:'Conf Champ',s:'upcoming'},
            {wk:23,label:'Super Bowl',s:'upcoming'},
          ].map(({wk,label,s}) => (
            <React.Fragment key={wk}>
              <div className={`px-3 py-1.5 rounded-md text-xs font-bold whitespace-nowrap ${
                s==='done'   ? 'bg-green-900 bg-opacity-30 text-green-500 border border-green-900' :
                s==='active' ? 'bg-indigo-900 bg-opacity-40 text-indigo-300 border border-indigo-700 glow-indigo' :
                               'bg-gray-900 text-gray-700 border border-gray-800'
              }`}>Wk {wk}: {label}</div>
              {wk!==23 && <div className="w-4 h-px bg-gray-800"></div>}
            </React.Fragment>
          ))}
        </div>

        {/* Brackets */}
        <div className="flex flex-wrap gap-8">
          {(view==='both'||view==='conf1') && <ConfBracket data={CONF1} />}
          {(view==='both'||view==='conf2') && <ConfBracket data={CONF2} />}
        </div>

        {/* Draft Pool Teaser */}
        <div className="glass rounded-xl p-5 mt-8">
          <div className="flex items-center gap-3 mb-4">
            <div className="w-2 h-2 rounded-full bg-blue-400 pulse-slow"></div>
            <h3 className="text-sm font-bold text-blue-400">Supplemental Draft Pool — Tuesday Redraft</h3>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div className="bg-black bg-opacity-30 rounded-lg p-4">
              <p className="text-xs text-gray-600 uppercase tracking-widest font-bold mb-1">Liquidated Players</p>
              <p className="text-3xl font-bold text-white">47</p>
              <p className="text-xs text-gray-500 mt-1">From 6 eliminated fantasy teams</p>
            </div>
            <div className="bg-black bg-opacity-30 rounded-lg p-4">
              <p className="text-xs text-gray-600 uppercase tracking-widest font-bold mb-1">Sanitized This Week</p>
              <p className="text-3xl font-bold text-orange-400">12</p>
              <p className="text-xs text-gray-500 mt-1">NFL teams eliminated: BUF, DET, LAC, TB</p>
            </div>
            <div className="bg-black bg-opacity-30 rounded-lg p-4">
              <p className="text-xs text-gray-600 uppercase tracking-widest font-bold mb-1">Draft Order (1.01)</p>
              <p className="text-xl font-bold text-yellow-400">Iron Wolves</p>
              <p className="text-xs text-gray-500 mt-1">Best reg-season record among survivors (13-4)</p>
            </div>
          </div>
        </div>

        <RosterLegend />
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
