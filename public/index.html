  <!-- ─── JSON-LD Structured Data: FAQPage ─── -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "What is SAM Sports?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "SAM Sports is a fantasy sports platform where you draft real A.Football and soccer players, manage salary caps, trade with other GMs, and compete for championships using our proprietary SAM Metric scoring system."
        }
      },
      {
        "@type": "Question",
        "name": "How does SAM Metric scoring work?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "SAM Metric is our proprietary scoring system that awards points for goals (8pts), assists (5pts), saves (3pts), pass accuracy bonuses, tackles (1.5pts), shots (0.5pts), and dribbles (1pt), creating a balanced evaluation of player performance."
        }
      },
      {
        "@type": "Question",
        "name": "What are SAM Points (SP)?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "SAM Points are the in-game currency used for drafting players, trades, and stadium upgrades. You earn SP through match wins (+500 SP), draws (+200 SP), daily logins (+50 SP), and 7-day streaks (+500 SP bonus)."
        }
      },
      {
        "@type": "Question",
        "name": "Can I play fantasy A.Football and soccer on SAM Sports?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes! SAM Sports supports both A.Football and soccer (Premier League, La Liga, Serie A, Bundesliga, Ligue 1, Ekstraklasa, Champions League, and World Cup 2026). Each sport has its own dedicated app with tailored features."
        }
      },
      {
        "@type": "Question",
        "name": "Is SAM Sports free to play?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "SAM Sports is free to play. Every team starts with a draft budget, and you earn SAM Points through gameplay. Optional SAM Points purchases are available for players who want to accelerate their team-building."
        }
      }
    ]
  }
  </script>
