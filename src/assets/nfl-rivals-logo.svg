<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 80" width="260" height="80">
  <defs>
    <linearGradient id="purpleMain" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="purpleGlow" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#a78bfa" flood-opacity="0.25"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- "SAM RIVALS" lockup -->
  <text x="130" y="30" text-anchor="middle"
        font-family="'Impact', 'Arial Black', sans-serif"
        font-size="32" font-weight="900" letter-spacing="3"
        filter="url(#purpleGlow)">
    <tspan fill="url(#purpleMain)">SAM</tspan><tspan dx="5" fill="#ffffff">RIVALS</tspan>
  </text>

  <!-- Purple underline -->
  <line x1="10" y1="38" x2="250" y2="38" stroke="url(#purpleMain)" stroke-width="2" opacity="0.6"/>

  <!-- Tagline -->
  <text x="130" y="55" text-anchor="middle"
        font-family="'Impact', 'Arial Black', sans-serif"
        font-size="9" font-weight="700" fill="#a78bfa" letter-spacing="5" opacity="0.5">
    FANTASY SPORTS REIMAGINED
  </text>

  <!-- Division dots (10 divisions, matching soccer Rivals) -->
  <g transform="translate(130, 70)">
    <circle cx="-54" cy="0" r="3" fill="#8b5cf6" opacity="0.6"/>
    <circle cx="-42" cy="0" r="3" fill="#a78bfa" opacity="0.6"/>
    <circle cx="-30" cy="0" r="3" fill="#3b82f6" opacity="0.7"/>
    <circle cx="-18" cy="0" r="3" fill="#60a5fa" opacity="0.7"/>
    <circle cx="-6"  cy="0" r="3" fill="#22c55e" opacity="0.7"/>
    <circle cx="6"   cy="0" r="3" fill="#4ade80" opacity="0.8"/>
    <circle cx="18"  cy="0" r="3" fill="#e5e4e2" opacity="0.7"/>
    <circle cx="30"  cy="0" r="3" fill="#cd7f32" opacity="0.8"/>
    <circle cx="42"  cy="0" r="3" fill="#c0c0c0" opacity="0.8"/>
    <circle cx="54"  cy="0" r="3" fill="#ffd700" opacity="0.9"/>
  </g>
</svg>
