name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 178.104.246.43 >> ~/.ssh/known_hosts

      - name: Rsync source to server
        run: |
          rsync -avz --delete \
            --exclude node_modules \
            --exclude build \
            --exclude .git \
            --exclude .github \
            -e "ssh -i ~/.ssh/id_ed25519" \
            ./ root@178.104.246.43:/opt/samsports/sm-website/

      - name: Install + build + reload nginx
        run: |
          ssh -i ~/.ssh/id_ed25519 root@178.104.246.43 bash -s <<'REMOTE'
          set -e
          cd /opt/samsports/sm-website
          npm install --no-audit --no-fund
          DISABLE_ESLINT_PLUGIN=true CI=false GENERATE_SOURCEMAP=false npm run build
          nginx -t && systemctl reload nginx
          REMOTE
